    <input type="password" id="pwInput" placeholder="л№„л°ҖлІҲнҳё" autocomplete="off"
      onkeydown="if(event.key==='Enter')unlockDashboard()">
    <button onclick="unlockDashboard()">нҷ•мқё</button>

<script>
// в”Җв”Җв”Җ Password Protection в”Җв”Җв”Җ
const _PW_HASH = '1f7192c8';
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(16).slice(0, 8);
}
function unlockDashboard() {
  const input = document.getElementById('pwInput').value;
  if (simpleHash(input) === _PW_HASH) {
    sessionStorage.setItem('tkcle_auth', '1');
    document.getElementById('lockScreen').classList.add('fade-out');
    document.getElementById('app').style.display = '';
    setTimeout(() => { document.getElementById('lockScreen').remove(); }, 500);
    if (typeof loadData === 'function') loadData(true).then(()=>{if(typeof updateDebugPanel==='function')updateDebugPanel();if(typeof updateJsonLinks==='function')updateJsonLinks();});
  } else {
    document.getElementById('pwInput').classList.add('shake');
    document.getElementById('pwError').textContent = 'л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ';
    setTimeout(() => { document.getElementById('pwInput').classList.remove('shake'); }, 400);
  }
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('tkcle_auth') === '1') {
  document.getElementById('lockScreen').remove();
  document.getElementById('app').style.display = '';
}
</script>

// в”Җв”Җв”Җ PRODUCT NORMALIZATION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function normalizeProduct(name) {
  if (!name) return 'кё°нғҖ';
  const n = name.trim();
  if (n.includes('л¬ҙк°Җ') || n.includes('м•„л§ҲмЎҙ мӨ‘лҸҷ') || n.includes('POC')) return 'лҢҖлҹүл¬ҙк°Җ';
  if (n.includes('мң к°Җ') || n.includes('2м°Ё нҷңмҡ©')) return 'мң к°Җ';
  if (n.includes('USP') || n.includes('1M нҢЁнӮӨм§Җ')) return 'USP н…ҢмҠӨнҠё';
  if (n.includes('л¬јлҘҳлҢҖн–ү')) return 'л¬јлҘҳлҢҖн–ү';
  if (n.includes('мҶҢмһ¬мҲҳкёү')) return 'мҶҢмһ¬мҲҳкёү';
  return 'кё°нғҖ';
}

function getProducts(client, brand, squad, year, month) {
  const key = client+'|'+brand+'|'+squad+'|'+String(year).replace(/['"]/g,'').trim()+'|'+parseInt(month);
  return PRODUCT_MAP[key] || [];
}
function renderProdTags(client, brand, squad, year, month) {
  const prods = getProducts(client, brand, squad, year, month);
  if (prods.length === 0) return '';
  return '<div class="prod-tags">' + prods.map(p =>
    '<span class="prod-tag">' + p.name +
    '<div class="prod-tip"><div style="font-weight:600;margin-bottom:4px;color:#c7d2fe;border-bottom:1px solid #334155;padding-bottom:3px">' + p.name + '</div>' +
    '<div class="tip-row"><span class="tip-label">GP</span><span class="tip-val">' + (p.gp>=0?'':'-') + Math.round(Math.abs(p.gp)).toLocaleString() + 'мӣҗ</span></div>' +
    '<div class="tip-row"><span class="tip-label">мҲҳм·Ё</span><span class="tip-val">' + Math.round(p.inAmt).toLocaleString() + 'мӣҗ</span></div>' +
    '</div></span>'
  ).join('') + '</div>';
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return null;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = [];
    let inQuote = false, cell = '';
    for (const ch of lines[i]) {
      if (ch === '"') { inQuote = !inQuote; }
      else if (ch === ',' && !inQuote) { cols.push(cell.trim()); cell = ''; }
      else if (ch === '\t' && !inQuote) { cols.push(cell.trim()); cell = ''; }
      else { cell += ch; }
    }
    cols.push(cell.trim());
    if (cols.length < 13) continue;
    // CSVлҸ„ Aм—ҙ л№Ҳм№ё нҸ¬н•Ё: [0]=л№Ҳм№ё, [1]=м—°мӣ”, [2]=кі к°қмӮ¬, ...
    const off = (!cols[0].trim() && cols[1] && cols[1].includes('л…„')) ? 1 : 0;
    const ym = cols[off+0], client = cols[off+1], brand = cols[off+2], squad = cols[off+3];
    const year = cols[off+4].replace(/['"]/g,'');
    const month = parseInt(cols[off+5]);
    const inAmt = parseFloat(String(cols[off+6]).replace(/[вӮ©,W]/g,'')) || 0;
    const outAmt = parseFloat(String(cols[off+9]).replace(/[вӮ©,W]/g,'')) || 0;
    const gp = parseFloat(String(cols[off+11]).replace(/[вӮ©,W]/g,'')) || 0;
    if (!ym || !client || isNaN(month)) continue;
    rows.push([ym, client, brand, squad, year, month, inAmt, outAmt, gp]);
  }

// в”Җв”Җв”Җ лЎңм»¬ лӮ м§ң л¬ёмһҗм—ҙ н—¬нҚј (toISOStringмқҖ UTC ліҖнҷҳмңјлЎң KSTм—җм„ң н•ҳлЈЁ л№ м§ҖлҠ” лІ„к·ё л°©м§Җ) в”Җв”Җ

// в”Җв”Җв”Җ CSV Fallback в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function fetchViaCSV(sheetId, gid) {
  gid = gid || 0;
  // 1м°Ё: gviz CSV endpoint
  const url1 = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:csv&gid='+gid;
  // 2м°Ё: export endpoint (лӢӨлҘё CORS м •мұ…мқј мҲҳ мһҲмқҢ)
  const url2 = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/export?format=csv&gid='+gid;
  const isFileProtocol = location.protocol === 'file:';
  if (isFileProtocol) {
    dbg('вҡ пёҸ file:// н”„лЎңнҶ мҪң к°җм§Җ вҶ’ CSV fetch л¶Ҳк°Җ (CORS м ңн•ң). JSONP лҳҗлҠ” GAS мӮ¬мҡ© к¶ҢмһҘ');
    return null;
  }
  for (const [label, url] of [['gviz CSV', url1], ['export CSV', url2]]) {
    dbg('рҹ“Ў '+label+' мҡ”мІӯ: gid='+gid);
    try {
      const resp = await fetch(url);
      if (!resp.ok) { dbg('вқҢ '+label+' HTTP '+resp.status); continue; }
      const text = await resp.text();
      if (text.includes('<!DOCTYPE html>') || text.includes('<html')) { dbg('вқҢ '+label+' вҶ’ HTML мқ‘лӢө (к¶Ңн•ң л¬ём ң)'); continue; }
      const rows = parseCSV(text);
      if (rows && rows.length > 0) { dbg('вң… '+label+' нҢҢмӢұ: '+rows.length+'н–ү'); return rows; }
      dbg('вҡ пёҸ '+label+' вҶ’ 0н–ү');
    } catch(e) { dbg('вқҢ '+label+' fetch error: '+e.message); }
  }
  return null;
}
// в”Җв”Җв”Җ GAS Proxy в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function fetchViaGAS(gasUrl, sheetId, gid) {
  gid = gid || 0;
  dbg('рҹ“Ў GAS мҡ”мІӯ: gid='+gid+' url='+gasUrl.substring(0,40)+'...');
  // GAS н”„лЎқмӢңлҠ” callback нҢҢлқјлҜён„°лҘј м§Ғм ‘ URLм—җ л„ЈмқҢ
  return new Promise((resolve) => {
    const cbName = '_gas_' + (++_jsonpCounter) + '_' + Date.now();
    const timeoutId = setTimeout(() => {
      dbg('вҸұ GAS timeout (20s)');
      delete window[cbName]; resolve(null);
    }, 20000);
    window[cbName] = function(response) {
      clearTimeout(timeoutId);
      delete window[cbName];
      dbg('вң… GAS мқ‘лӢө мҲҳмӢ ');
      // GAS н”„лЎқмӢңк°Җ gviz нҳ•нғңлЎң л°ҳнҷҳн•ҳлҠ” кІҪмҡ°
      if (response && response.table) {
        resolve(parseGvizResponse(response));
      }
      // GAS н”„лЎқмӢңк°Җ {status, table} нҳ•нғңмқё кІҪмҡ°
      else if (response && response.status === 'ok' && response.data) {
        resolve(response.data);
      }
      else if (response && response.status === 'error') {
        dbg('вқҢ GAS error: '+(response.message||'unknown'));
        resolve(null);
      }
      else {
        dbg('вҡ пёҸ GAS м•Ң мҲҳ м—ҶлҠ” мқ‘лӢө нҳ•мӢқ: '+JSON.stringify(response).substring(0,100));
        resolve(null);
      }
    };
    const oldScript = document.getElementById('gas-'+cbName);
    if (oldScript) oldScript.remove();
    const script = document.createElement('script');
    script.id = 'gas-'+cbName;
    const sep = gasUrl.indexOf('?') >= 0 ? '&' : '?';
    script.src = gasUrl + sep + 'callback='+cbName+'&id='+encodeURIComponent(sheetId)+'&gid='+gid;
    script.onerror = (e) => {
      clearTimeout(timeoutId); delete window[cbName];
      dbg('вқҢ GAS script load error');
      resolve(null);
    };
    document.body.appendChild(script);
  });
}
// в”Җв”Җв”Җ Google Visualization API (кіөмӢқ лқјмқҙлёҢлҹ¬лҰ¬, file://м—җм„ңлҸ„ мһ‘лҸҷ к°ҖлҠҘ) в”Җв”Җ
function fetchViaGoogleViz(sheetId, gid) {
  gid = gid || 0;
  dbg('в”Җв”Җ Google Visualization API мӢңлҸ„ (gid='+gid+')');
  return new Promise((resolve) => {
    try {
      if (typeof google === 'undefined' || !google.charts) {
        dbg('вҡ пёҸ Google Charts лқјмқҙлёҢлҹ¬лҰ¬ лҜёлЎңл“ң');
        resolve(null); return;
      }
      google.charts.load('current');
      google.charts.setOnLoadCallback(() => {
        try {
          const url = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+gid;
          const query = new google.visualization.Query(url);
          query.setTimeout(20);
          query.send(function(response) {
            if (response.isError()) {
              dbg('вқҢ Google Viz error: '+response.getMessage());
              resolve(null); return;
            }
            dbg('вң… Google Viz мқ‘лӢө мҲҳмӢ ');
            const dt = response.getDataTable();
            const numCols = dt.getNumberOfColumns();
            const numRows = dt.getNumberOfRows();
            dbg('   '+numRows+'н–ү Г— '+numCols+'м—ҙ');
            // DataTable вҶ’ gviz нҳёнҷҳ нҳ•мӢқмңјлЎң ліҖнҷҳ
            const cols = []; for (let c=0;c<numCols;c++) cols.push({type:dt.getColumnType(c),label:dt.getColumnLabel(c)});
            const rows = [];
            for (let r=0;r<numRows;r++) {
              const cells = [];
              for (let c=0;c<numCols;c++) {
                const v = dt.getValue(r,c);
                const f = dt.getFormattedValue(r,c);
                cells.push({v:v, f:f||''});
              }
              rows.push({c:cells});
            }
            const fakeResp = {status:'ok', table:{cols:cols, rows:rows, parsedNumHeaders:1}};
            const parsed = parseGvizResponse(fakeResp);
            if (parsed) parsed._rawResponse = fakeResp;
            resolve(parsed);
          });
        } catch(e) { dbg('вқҢ Google Viz query error: '+e.message); resolve(null); }
      });
    } catch(e) { dbg('вқҢ Google Viz init error: '+e.message); resolve(null); }
  });
}

// в”Җв”Җв”Җ мқён”Ң м§Җкёү мӢңнҠё(gid=1385383205) нҢҢмӢұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// м»¬лҹј: C=кі к°қмӮ¬, D=лёҢлһңл“ң, E=CSM, I=кёҲм•Ў(USD), J=кёҲм•Ў(KRW), K=м§Җкёүмқјмһҗ
function parseInfluPayResponse(response) {
  try {
    const table = response.table;
    if (!table || !table.rows) return [];
    const data = [];
    const cClient=2, cBrand=3, cCsm=4, cYear=5, cMonth=6, cUsd=8, cKrw=9, cDate=10;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v != null ? c[idx].v : (c[idx].f || '')) : '';
      let rawDate = val(cDate);
      let dateStr = '';
      if (rawDate instanceof Date) {
        dateStr = rawDate.getFullYear()+'-'+String(rawDate.getMonth()+1).padStart(2,'0')+'-'+String(rawDate.getDate()).padStart(2,'0');
      } else if (typeof rawDate === 'string' && rawDate.startsWith('Date(')) {
        const m = rawDate.match(/Date\((\d+),(\d+),(\d+)/);
        if (m) dateStr = m[1]+'-'+String(parseInt(m[2])+1).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      } else if (rawDate) {
        const m = String(rawDate).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if (m) dateStr = m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      }
      if (!dateStr) continue;
      const krw = parseFloat(String(val(cKrw)||'').replace(/[вӮ©,W\s]/g,'')) || 0;
      const usd = parseFloat(String(val(cUsd)||'').replace(/[$,\s]/g,'')) || 0;
      const amt = krw > 0 ? krw : Math.round(usd * FX_USD_TO_KRW);
      if (amt <= 0) continue;
      data.push({
        date: dateStr,
        ym: dateStr.slice(0,7),
        amt,
        client: String(val(cClient)||'').trim(),
        brand: String(val(cBrand)||'').trim(),
        csm: String(val(cCsm)||'').trim(),
        year: String(val(cYear)||'').replace(/['"]/g,'').trim(),
        month: parseInt(val(cMonth)) || 0,
        usdOriginal: usd,
        krwOriginal: krw > 0
      });
    }
    return data;
  } catch(e) {
    dbg('вҡ пёҸ мқён”Ң м§Җкёү нҢҢмӢұ м—җлҹ¬: '+e.message);
    return [];
  }
}
// в”Җв”Җв”Җ Cashflow sheet вҶ’ PRODUCT_MAP нҢҢмӢұ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// cashflow мӢңнҠём—җм„ң C=мә нҺҳмқё, D=кі к°қмӮ¬, E=лёҢлһңл“ң, F=мғҒн’Ҳ, N=м—°лҸ„, O=мӣ”, P=мҲҳм·Ё, Q=м§Җкёү
function parseCashflowForProducts(response) {
  try {
    const table = response.table;
    const numCols = table.cols ? table.cols.length : 0;
    if (numCols < 15) return null; // cashflow нҳ•мӢқмқҙ м•„лӢҳ
    const productMap = {};
    const campList = [];
    let rowCount = 0;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v !== null && c[idx].v !== undefined ? c[idx].v : (c[idx].f || '')) : '';
      const client = String(val(2)).trim();   // C=кі к°қмӮ¬
      const brand = String(val(3)).trim();    // D=лёҢлһңл“ң
      const product = String(val(4)).trim();  // E=мғҒн’Ҳ
      const squad = String(val(6)).trim();    // G=лӢҙлӢ№мҠӨмҝјл“ң
      const country = String(val(7)).trim();  // H=көӯк°Җ
      const item    = String(val(8)).trim();  // I=м ңн’Ҳ
      const year = String(val(12)).replace(/['"]/g,'').trim(); // M=м—°лҸ„
      const month = parseInt(val(13));        // N=мӣ”
      const inAmt = parseFloat(String(val(14)).replace(/[вӮ©,W]/g,'')) || 0;  // O=мҲҳм·Ё
      const outAmt = parseFloat(String(val(15)).replace(/[вӮ©,W]/g,'')) || 0; // P=м§Җкёү
      if (!client || !product || isNaN(month)) continue;
      const gp = inAmt - outAmt;
      // л§Өм№ӯ нӮӨ: кі к°қмӮ¬|лёҢлһңл“ң|лӢҙлӢ№мҠӨмҝјл“ң|м—°лҸ„|мӣ” (нҶөн•©м •мӮ° C~G вҶ” cashflow D,E,H,N,O)
      const normProd = normalizeProduct(product);
      const pKey = client+'|'+brand+'|'+squad+'|'+year+'|'+month;
      if (!productMap[pKey]) productMap[pKey] = {};
      if (!productMap[pKey][normProd]) productMap[pKey][normProd] = {gp:0, inAmt:0};
      productMap[pKey][normProd].gp += gp;
      productMap[pKey][normProd].inAmt += inAmt;
      rowCount++;
      // Campaign timeline extraction
      const campName = String(val(1)).trim();
      const dateVal2 = (idx) => { const v = val(idx); if (!v) return null; const s = String(v).trim(); if (!s || s === 'вҖ”') return null; if (s.match(/^Date\(/)) { const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/); if(dm) return dm[1]+'-'+String(+dm[2]+1).padStart(2,'0')+'-'+String(+dm[3]).padStart(2,'0'); } return s.length >= 10 ? s.slice(0,10) : null; };
      const numVal2 = (idx) => { const v = val(idx); return v ? (parseInt(v) || 0) : 0; };
      if (campName) {
        const numColsCheck = numCols > 25;
        const ds = numColsCheck ? dateVal2(25) : null, de = numColsCheck ? dateVal2(26) : null, ss = numColsCheck ? dateVal2(27) : null;
        const rs = numColsCheck ? dateVal2(28) : null, re = numColsCheck ? dateVal2(29) : null, ce = numColsCheck ? dateVal2(30) : null;
        const are = numColsCheck ? dateVal2(34) : null;
        const ta = numColsCheck ? numVal2(31) : 0, ts = numColsCheck ? numVal2(32) : 0, tr = numColsCheck ? numVal2(33) : 0;
        const campStatus = String(val(11)).trim(); // Lм—ҙ=мә нҺҳмқё л§Ҳк°җ м—¬л¶Җ
        campList.push({campaign:campName, client, brand, product, squad, country, item, year, month, gp, inAmt, outAmt, discStart:ds, discEnd:de, shipStart:ss, recStart:rs, recEnd:re, contractEnd:ce, tgtAccept:ta, tgtShip:ts, tgtRec:tr, actualRecEnd:are, campStatus});
      }
    }
    // Array нҳ•нғңлЎң ліҖнҷҳ (GP лӮҙлҰјм°ЁмҲң м •л ¬)
    const result = {};
    for (const [k, prods] of Object.entries(productMap)) {
      result[k] = Object.entries(prods)
        .map(([name, v]) => ({name, gp:v.gp, inAmt:v.inAmt}))
        .sort((a,b) => b.gp - a.gp);
    }
    // Store campaign data globally
    if (campList.length > 0) {
      CAMPAIGN_DATA = campList;
      dbg('вң… мә нҺҳмқё нғҖмһ„лқјмқё '+campList.length+'кұҙ лЎңл“ң (cashflow лі„лҸ„ нҢҢмӢұ)');
    }
    dbg('Cashflow нҢҢмӢұ: '+rowCount+'н–ү вҶ’ '+Object.keys(result).length+'к°ң мғҒн’Ҳ нӮӨ');
    return Object.keys(result).length > 0 ? result : null;
  } catch(e) {
    dbg('вқҢ Cashflow parse error: '+e.message);
    return null;
  }
}
// в”Җв”Җв”Җ мғҒн’Ҳ лҚ°мқҙн„° лЎңл“ң (cashflow мӢңнҠё нғҗмғү) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadProductData(sheetId) {
  dbg('рҹ“Ұ мғҒн’Ҳ лҚ°мқҙн„° лЎңл“ң мӢңмһ‘...');
  const manualGid = localStorage.getItem('tkcle_cashflow_gid');
  const defaultGids = [159763230, 0, 1, 2, 3, 4, 5].filter(g => g !== MAIN_GID);
  const gidList = manualGid ? [parseInt(manualGid)] : defaultGids;
  dbg('нғҗмғү gid лӘ©лЎқ: ['+gidList.join(',')+']'+(manualGid?' (мҲҳлҸҷм„Өм •)':''));
  let mainSig = null;
  if (RAW.length > 0) {
    mainSig = RAW.length + '|' + (RAW[0]||[]).join('|').substring(0, 100);
  }
  for (const gid of gidList) {
    let response = null;
    if (GAS_URL) {
      response = await fetchSheetGAS(GAS_URL, sheetId, gid, '_handleProd'+gid);
    }
    if (!response) {
      response = await fetchSheetJSONP(sheetId, gid, '_handleProd'+gid);
    }
    // Google Viz API fallback for product sheets
    if (!response && typeof google !== 'undefined' && google.visualization) {
      dbg('рҹ“Ў мғҒн’Ҳ мӢңнҠё Google Viz: gid='+gid);
      const vizData = await fetchViaGoogleViz(sheetId, gid);
      if (vizData && vizData._rawResponse) response = vizData._rawResponse;
    }
    if (!response || !response.table) {
      dbg('gid='+gid+': мқ‘лӢө м—ҶмқҢ (мӢңнҠё м—Ҷкұ°лӮҳ к¶Ңн•ң л¬ём ң)');
      continue;
    }
    const rows = response.table.rows || [];
    const numCols = response.table.cols?.length || 0;
    // л©”мқё мӢңнҠё мӨ‘ліө л°©м§Җ: м—ҙ мҲҳк°Җ лӢӨлҘҙл©ҙ лӢӨлҘё мӢңнҠёлЎң к°„мЈј (cashflowлҠ” ліҙнҶө 30м—ҙ мқҙмғҒ)
    const sig = numCols + ':' + rows.length + '|' + (rows[0]?.c||[]).map(c => c?.v||'').join('|').substring(0, 100);
    if (mainSig && sig === mainSig) {
      dbg('gid='+gid+': л©”мқё мӢңнҠё мӨ‘ліө вҶ’ skip');
      continue;
    }
    dbg('gid='+gid+': '+numCols+'м—ҙ, '+rows.length+'н–ү');
    if (numCols >= 15) {
      const prodMap = parseCashflowForProducts(response);
      if (prodMap) {
        PRODUCT_MAP = prodMap;
        localStorage.setItem('tkcle_cashflow_gid', String(gid));
        dbg('вң… gid='+gid+'м—җм„ң мғҒн’Ҳ '+Object.keys(prodMap).length+'к°ң нӮӨ л§Өм№ӯ мҷ„лЈҢ!');
        return true;
      } else { dbg('gid='+gid+': cashflow нҳ•мӢқмқҙлӮҳ л§Өм№ӯ кІ°кіј м—ҶмқҢ'); }
    } else { dbg('gid='+gid+': '+numCols+'м—ҙ < 15 вҶ’ cashflow м•„лӢҳ'); }
  }
  dbg('вқҢ cashflow мӢңнҠё лҜёл°ңкІ¬ (gid '+gidList.join(',')+' нғҗмғү мҷ„лЈҢ)');
  return false;
}
// в”Җв”Җв”Җ Main Data Load в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function loadData(showStatus) {
  _debugLog.length = 0; // лЎңк·ё мҙҲкё°нҷ”
  const sheetId = extractSheetId(SHEETS_ID);
  dbg('рҹҡҖ loadData мӢңмһ‘ | sheetId="'+sheetId+'" | л©”мқё gid='+MAIN_GID);
  dbg('   н”„лЎңнҶ мҪң: '+location.protocol+' | GAS: '+(GAS_URL ? 'м„Өм •лҗЁ' : 'лҜём„Өм •'));
  if (location.protocol === 'file:') dbg('вҡ пёҸ file:// нҷҳкІҪ вҶ’ CSV fetch л¶Ҳк°Җ, JSONP/GoogleViz мӮ¬мҡ©');
  function applyData(sheetsData, source) {
    RAW.length = 0;
    const rows = sheetsData.rows || sheetsData;
    rows.forEach(r => RAW.push(r));
    dbg('вң… '+source+' вҶ’ '+rows.length+'н–ү лЎңл“ң м„ұкіө');
    if (sheetsData.productMap && Object.keys(sheetsData.productMap).length > 0) {
      PRODUCT_MAP = sheetsData.productMap;
      dbg('вң… л©”мқё мӢңнҠём—җм„ң мғҒн’Ҳ лҚ°мқҙн„° нҸ¬н•Ё ('+Object.keys(PRODUCT_MAP).length+'к°ң нӮӨ)');
    }
    if (sheetsData.campaignData && sheetsData.campaignData.length > 0) {
      CAMPAIGN_DATA = sheetsData.campaignData;
      dbg('вң… мә нҺҳмқё нғҖмһ„лқјмқё лҚ°мқҙн„° '+CAMPAIGN_DATA.length+'кұҙ лЎңл“ң');
    }
    dataSource = 'sheets';
    lastUpdateTime = new Date();
    rebuildGlobals();
    render();
  }
  if (sheetId) {
    isLoading = true;
    if (showStatus) updateStatusUI();
    let mainLoaded = false;
    // 1-A) GAS н”„лЎқмӢң
    if (GAS_URL) {
      dbg('в”Җв”Җ 1-A) GAS н”„лЎқмӢңлЎң л©”мқё(gid='+MAIN_GID+') мӢңлҸ„');
      const gasData = await fetchViaGAS(GAS_URL, sheetId, MAIN_GID);
      if (gasData) {
        isLoading = false;
        applyData(gasData, 'GAS proxy');
        mainLoaded = true;
      } else { dbg('вқҢ GAS л©”мқё лЎңл“ң мӢӨнҢЁ'); }
    }
    // 1-B) JSONP (Google Visualization API)
    if (!mainLoaded) {
      dbg('в”Җв”Җ 1-B) JSONP(gviz)лЎң л©”мқё(gid='+MAIN_GID+') мӢңлҸ„');
      const sheetsData = await fetchViaJSONP(sheetId, MAIN_GID);
      if (sheetsData) {
        isLoading = false;
        applyData(sheetsData, 'JSONP');
        mainLoaded = true;
      } else { dbg('вқҢ JSONP л©”мқё лЎңл“ң мӢӨнҢЁ'); }
    }
    // 1-C) Google Visualization API (кіөмӢқ лқјмқҙлёҢлҹ¬лҰ¬)
    if (!mainLoaded) {
      dbg('в”Җв”Җ 1-C) Google Visualization APIлЎң л©”мқё(gid='+MAIN_GID+') мӢңлҸ„');
      const vizData = await fetchViaGoogleViz(sheetId, MAIN_GID);
      if (vizData) {
        isLoading = false;
        applyData(vizData, 'Google Viz API');
        mainLoaded = true;
      } else { dbg('вқҢ Google Viz л©”мқё лЎңл“ң мӢӨнҢЁ'); }
    }
    // 1-D) CSV
    if (!mainLoaded) {
      dbg('в”Җв”Җ 1-D) CSVлЎң л©”мқё(gid='+MAIN_GID+') мӢңлҸ„');
      const csvData = await fetchViaCSV(sheetId, MAIN_GID);
      isLoading = false;
      if (csvData && csvData.length > 0) {
        RAW.length = 0; csvData.forEach(r => RAW.push(r));
        dataSource = 'sheets'; lastUpdateTime = new Date();
        dbg('вң… CSV вҶ’ '+csvData.length+'н–ү лЎңл“ң м„ұкіө');
        rebuildGlobals(); render(); mainLoaded = true;
      } else { dbg('вқҢ CSV л©”мқё лЎңл“ң мӢӨнҢЁ'); }
    }
    // 2+3) мғҒн’Ҳ лҚ°мқҙн„° + л§Өм¶ңм •мӮ° лі‘л ¬ лЎңл“ң
    if (mainLoaded) {
      const jobs = [];

      // к°•м ң мғҲлЎңкі м№Ё(showStatus) лҳҗлҠ” мөңмҙҲ лЎңл”© мӢң н•ӯмғҒ cashflow мӢңнҠё мһ¬лЎңл“ң
      if (showStatus || Object.keys(PRODUCT_MAP).length === 0) {
        dbg('в”Җв”Җ 2) cashflow мӢңнҠё лЎңл“ң (мә нҺҳмқё нғҖмһ„лқјмқё к°ұмӢ )');
        CAMPAIGN_DATA = []; // мәҗмӢң мҙҲкё°нҷ”
        jobs.push(
          loadProductData(sheetId).then(found => { if (found) render(); })
        );
      }

      dbg('в”Җв”Җ 3) л§Өм¶ңм •мӮ° мӢңнҠё(gid='+TAX_GID+') лі‘л ¬ лЎңл“ң');
      const taxUrl = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+TAX_GID+'&_='+Date.now();
      jobs.push(
        loadJSONP(taxUrl, 15000).then(rawTaxResp => {
          if (rawTaxResp && rawTaxResp.table) {
            const taxData = parseSettlementResponse(rawTaxResp);
            if (taxData && taxData.length > 0) {
              TAX_DATA = taxData;
              dbg('вң… м„ёкёҲкі„мӮ°м„ң лҚ°мқҙн„° '+TAX_DATA.length+'кұҙ лЎңл“ң');
              render();
            } else { dbg('вҡ пёҸ л§Өм¶ңм •мӮ° нҢҢмӢұ кІ°кіј м—ҶмқҢ'); }
          } else { dbg('вҡ пёҸ л§Өм¶ңм •мӮ° JSONP мӢӨнҢЁ вҶ’ мҠӨнӮө'); }
        })
      );

      dbg('в”Җв”Җ 4) мқён”Ң м§Җкёү мӢңнҠё(gid='+INFLU_PAY_GID+') лі‘л ¬ лЎңл“ң');
      const influUrl = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+INFLU_PAY_GID+'&_='+Date.now();
      jobs.push(
        loadJSONP(influUrl, 15000).then(rawInfluResp => {
          if (rawInfluResp && rawInfluResp.table) {
            const influData = parseInfluPayResponse(rawInfluResp);
            if (influData && influData.length > 0) {
              INFLU_PAY_DATA = influData;
              dbg('вң… мқён”Ң м§Җкёү лҚ°мқҙн„° '+INFLU_PAY_DATA.length+'кұҙ лЎңл“ң');
              render();
            } else { dbg('вҡ пёҸ мқён”Ң м§Җкёү нҢҢмӢұ кІ°кіј м—ҶмқҢ'); }
          } else { dbg('вҡ пёҸ мқён”Ң м§Җкёү JSONP мӢӨнҢЁ вҶ’ мҠӨнӮө'); }
        })
      );

      await Promise.all(jobs);
    }
    if (!mainLoaded) {
      dbg('вҡ пёҸ лӘЁл“  л°©лІ• мӢӨнҢЁ вҶ’ fallback лҚ°мқҙн„° мӮ¬мҡ©');
      if (location.protocol === 'file:') {
        dbg('');
        dbg('рҹ’Ў [н•ҙкІ°л°©лІ•] file:// н”„лЎңнҶ мҪңм—җм„ңлҠ” мҷёл¶Җ лҚ°мқҙн„° лЎңл“ңк°Җ м°ЁлӢЁлҗ©лӢҲлӢӨ.');
        dbg('   м•„лһҳ мӨ‘ н•ҳлӮҳлҘј мӢңлҸ„н•ҙ мЈјм„ёмҡ”:');
        dbg('   1) н„°лҜёл„җ/CMDм—җм„ң: python -m http.server 8080');
        dbg('      вҶ’ http://localhost:8080/tkcle_dashboard_v2.html м ‘мҶҚ');
        dbg('   2) VS Codeмқҳ "Live Server" нҷ•мһҘ н”„лЎңк·ёлһЁ мӮ¬мҡ©');
        dbg('   3) м„Өм • нҢЁл„җмқҳ "лҚ°мқҙн„° л¶ҷм—¬л„Јкё°" кё°лҠҘ мӮ¬мҡ©');
      } else {
        dbg('рҹ”— м§„лӢЁ: м•„лһҳ URLмқ„ лёҢлқјмҡ°м Җ мғҲ нғӯм—җм„ң м—ҙм–ҙліҙм„ёмҡ”:');
        dbg('   https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID);
        dbg('   вҶ’ лҚ°мқҙн„°к°Җ ліҙмқҙл©ҙ мӢңнҠё кіөк°ң OK, м•Ҳ ліҙмқҙл©ҙ кіөк°ң м„Өм • нҷ•мқё');
      }
    }
    if (mainLoaded) return;
  } else { dbg('вҡ пёҸ sheetIdк°Җ л№„м–ҙмһҲмқҢ вҶ’ fallback'); }
  // Fallback
  RAW.length = 0; FALLBACK_RAW.forEach(r => RAW.push(r));
  dataSource = sheetId ? 'error' : 'fallback';
  lastUpdateTime = new Date();
  rebuildGlobals(); render();
}

// в”Җв”Җв”Җ GAS POST: мә нҺҳмқё мғҒнғң(Lм—ҙ) м—…лҚ°мқҙнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function gasUpdateStatus(campaign, client, status) {
  if (!GAS_URL) {
    alert('GAS URLмқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.\nм„Өм • нҢЁл„җм—җм„ң GAS н”„лЎқмӢң URLмқ„ мһ…л Ҙн•ҙмЈјм„ёмҡ”.');
    return false;
  }
  const secret = localStorage.getItem('tkcle_gas_secret') || '';
  if (!secret) {
    alert('кіөмң  л№„л°ҖнӮӨк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.\nм„Өм • нҢЁл„җм—җм„ң л№„л°ҖнӮӨлҘј мһ…л Ҙн•ҙмЈјм„ёмҡ”.');
    return false;
  }
  return new Promise((resolve) => {
    const cbName = '_gasWrite_' + Date.now();
    const timeoutId = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      alert('GAS мқ‘лӢө мӢңк°„ мҙҲкіј. GAS URLмқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');
      resolve(false);
    }, 10000);

    window[cbName] = (result) => {
      clearTimeout(timeoutId);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      if (result.success) {
        dbg('вң… мғҒнғң м—…лҚ°мқҙнҠё: '+campaign+' / '+client+' вҶ’ '+status+' ('+result.updated+'н–ү)');
        resolve(true);
      } else {
        alert('м—…лҚ°мқҙнҠё мӢӨнҢЁ: ' + (result.error || 'м•Ң мҲҳ м—ҶлҠ” мҳӨлҘҳ'));
        resolve(false);
      }
    };

    const sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    const url = GAS_URL + sep +
      'callback=' + cbName +
      '&action=updateStatus' +
      '&secret=' + encodeURIComponent(secret) +
      '&campaign=' + encodeURIComponent(campaign) +
      '&client=' + encodeURIComponent(client) +
      '&status=' + encodeURIComponent(status);

    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timeoutId);
      delete window[cbName];
      script.remove();
      dbg('вқҢ gasUpdateStatus onerror: ' + url.substring(0, 120));
      alert('GAS мҡ”мІӯ мҳӨлҘҳ.\n\nк°ҖлҠҘн•ң мӣҗмқё:\nвҖў GASк°Җ мһ¬л°°нҸ¬ н•„мҡ”\nвҖў л„ӨнҠёмӣҢнҒ¬ мқјмӢң мҳӨлҘҳ\n\nмһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”.');
      resolve(false);
    };
    document.body.appendChild(script); // head лҢҖмӢ  body: мқјл¶Җ лёҢлқјмҡ°м Җ head onerror л°©м§Җ
  });
}
// в”Җв”Җв”Җ нҸ¬нҠёнҸҙлҰ¬мҳӨ мә нҺҳмқё м„ёл¶Җ нҶ кёҖ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ

// в”Җв”Җв”Җ мғҒнғң л°°м§Җ нҒҙлҰӯ вҶ’ л“ңлЎӯлӢӨмҡҙ мҲҳм • в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// brand/year/month/product/country/item мқҖ нғҖмһ„лқјмқё лҜёл“ұлЎқ н…Ңмқҙлё”м—җм„ңл§Ң м „лӢ¬ (л…ёTL м „мҡ© + лІ„нҠјмҡ©)
async function openStatusEdit(uid, campaign, client, current, brand, year, month, product, country, item) {
  const el = document.getElementById(uid);
  if (!el) return;
  const opts = ['мҡҙмҳҒ м „','мҡҙмҳҒ мӨ‘','л§Ҳк°җ','нҷҖл”©'];
  const smap = {
    'мҡҙмҳҒ м „': {bg:'#422006',color:'#fbbf24',label:'мҡҙмҳҒ м „'},
    'мҡҙмҳҒ мӨ‘': {bg:'#14532d',color:'#4ade80',label:'мҡҙмҳҒ мӨ‘'},
    'л§Ҳк°җ':    {bg:'#1e293b',color:'#94a3b8',label:'л§Ҳк°җ'},
    'нҷҖл”©':    {bg:'#3b1c1c',color:'#f87171',label:'нҷҖл”©'},
  };
  const v = String(current||'').trim()
    .replace(/^мҡҙмҳҒ\s*мӨ‘[\s\S]*$/, 'мҡҙмҳҒ мӨ‘')
    .replace(/^мҡҙмҳҒ\s*м „[\s\S]*$/, 'мҡҙмҳҒ м „')
    .replace(/^л§Ҳк°җ[\s\S]*$/, 'л§Ҳк°җ')
    .replace(/^нҷҖл”©[\s\S]*$/, 'нҷҖл”©');
  const origHTML = el.outerHTML;
  const esc2 = s => String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const hasExtra = !!(brand && year && month); // noTL м „мҡ© м¶”к°Җ лҚ°мқҙн„° м—¬л¶Җ

  // в”Җв”Җ л“ңлЎӯлӢӨмҡҙ + (+ лІ„нҠј) лһҳнҚј м»Ён…Ңмқҙл„Ҳ в”Җв”Җ
  const container = document.createElement('span');
  container.style.cssText = 'display:inline-flex;align-items:center;gap:4px';

  const sel = document.createElement('select');
  sel.style.cssText = 'font-size:10px;background:#1e293b;color:#e2e8f0;border:1px solid #4ade80;border-radius:8px;padding:2px 6px;cursor:pointer;outline:none;';
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === v) opt.selected = true;
    sel.appendChild(opt);
  });
  container.appendChild(sel);

  // в”Җв”Җ "+" лІ„нҠј (noTL м „мҡ©: мҡҙмҳҒ мӨ‘ м„ нғқ мӢң нҷңм„ұнҷ”) в”Җв”Җ
  let plusBtn = null;
  let skipBlur = false;
  if (hasExtra) {
    plusBtn = document.createElement('button');
    plusBtn.textContent = '+';
    plusBtn.title = 'нғҖмһ„лқјмқё В· м ңн’ҲлӘ… В· л§Ҳк°җм—¬л¶Җ мһ…л Ҙ';
    plusBtn.style.cssText = 'padding:2px 8px;background:#818cf8;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;display:' + (v === 'мҡҙмҳҒ мӨ‘' ? 'inline-block' : 'none');
    container.appendChild(plusBtn);

    // л“ңлЎӯлӢӨмҡҙ ліҖкІҪ мӢң + лІ„нҠј н‘ңмӢң/мҲЁк№Җ
    sel.addEventListener('change', () => {
      if (plusBtn) plusBtn.style.display = sel.value === 'мҡҙмҳҒ мӨ‘' ? 'inline-block' : 'none';
    });

    // + лІ„нҠј нҒҙлҰӯ мӢң: blur м–өм ң вҶ’ мғҒнғң м ҖмһҘ вҶ’ нғҖмһ„лқјмқё лӘЁлӢ¬ м—ҙкё°
    plusBtn.addEventListener('mousedown', () => { skipBlur = true; });
    plusBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      skipBlur = false;
      const newVal = sel.value;
      // мғҒнғңк°Җ л°”лҖҢм—Ҳмңјл©ҙ лЁјм Җ м ҖмһҘ
      if (newVal !== v) {

      }
      // м»Ён…Ңмқҙл„ҲлҘј мӣҗлһҳ л°°м§Җ нҳ•нғңлЎң көҗмІҙ (+ лІ„нҠјмқҖ м—ҶмқҢ вҖ” лӘЁлӢ¬м—җм„ң мІҳлҰ¬)
      const m = smap[newVal] || {bg:'#1e293b',color:'#94a3b8',label:newVal};

      const newHTML = '<span id="'+uid+'" style="display:inline-block;padding:2px 7px;border-radius:10px;background:'+m.bg+';color:'+m.color+';font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid transparent" onmouseenter="this.style.borderColor=\''+m.color+'44\'" onmouseleave="this.style.borderColor=\'transparent\'" onclick="openStatusEdit(\''+uid+'\',\''+esc2(campaign)+'\',\''+esc2(client)+'\',\''+esc2(newVal)+'\''+extraArgs+')" title="нҒҙлҰӯн•ҳм—¬ мҲҳм •">'+m.label+'</span>';
      const tmp = document.createElement('span');
      tmp.innerHTML = newHTML;
      if (container.parentNode) container.replaceWith(tmp.firstChild);
      // нғҖмһ„лқјмқё лӘЁлӢ¬ м—ҙкё° (лӮ м§ңлҠ” лӘЁл‘җ л№Ҳ к°’, campStatusлҠ” нҳ„мһ¬ м„ нғқк°’)
      openTimelineEdit(client, brand, year, month, product||'', country||'', item||'', '', '', '', '', '', '', newVal);
    });
  }

  el.replaceWith(container);
  container.id = uid;
  el.removeAttribute('id');
  setTimeout(() => sel.focus(), 10);

  let changeHandled = false;
  const revert = () => {
    if (!container.parentNode) return;
    const tmp = document.createElement('span');
    tmp.innerHTML = origHTML;
    container.replaceWith(tmp.firstChild);
  };

  sel.addEventListener('change', async () => {
    if (changeHandled) return;
    changeHandled = true;
    const newVal = sel.value;
    sel.disabled = true;
    sel.style.opacity = '0.5';

      });

    } else {
      changeHandled = false;
      sel.disabled = false;
      sel.style.opacity = '1';
      sel.value = v;
    }
  });
  sel.addEventListener('blur', () => {
    if (skipBlur) return;
    if (!changeHandled) setTimeout(revert, 150);
  });
  sel.addEventListener('keydown', e => {
    if (e.key === 'Escape') { changeHandled = true; revert(); }
  });
}

// в”Җв”Җв”Җ GAS: нғҖмһ„лқјмқё лӮ м§ң м—…лҚ°мқҙнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
async function gasUpdateTimeline(client, brand, year, month, country, item, dates, newItem, newCampStatus) {
  if (!GAS_URL) { alert('GAS URLмқҙ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.'); return false; }
  const secret = localStorage.getItem('tkcle_gas_secret') || '';
  if (!secret) { alert('кіөмң  л№„л°ҖнӮӨк°Җ м„Өм •лҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ.'); return false; }
  return new Promise((resolve) => {
    const cbName = '_gasTL_' + Date.now();
    const timeoutId = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      alert('GAS мқ‘лӢө мӢңк°„ мҙҲкіј.');
      resolve(null);
    }, 10000);
    window[cbName] = (result) => {
      clearTimeout(timeoutId);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      if (result.success) { resolve(result); }
      else { alert('нғҖмһ„лқјмқё м—…лҚ°мқҙнҠё мӢӨнҢЁ: ' + (result.error || 'м•Ң мҲҳ м—ҶлҠ” мҳӨлҘҳ')); resolve(null); }
    };
    const sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    const url = GAS_URL + sep +
      'callback=' + cbName +
      '&action=updateTimeline' +
      '&secret=' + encodeURIComponent(secret) +
      '&client=' + encodeURIComponent(client) +
      '&brand=' + encodeURIComponent(brand) +
      '&year=' + encodeURIComponent(year) +
      '&month=' + encodeURIComponent(month) +
      '&country=' + encodeURIComponent(country||'') +
      '&item=' + encodeURIComponent(item||'') +
      '&discStart=' + encodeURIComponent(dates.discStart||'') +
      '&discEnd=' + encodeURIComponent(dates.discEnd||'') +
      '&shipStart=' + encodeURIComponent(dates.shipStart||'') +
      '&recStart=' + encodeURIComponent(dates.recStart||'') +
      '&recEnd=' + encodeURIComponent(dates.recEnd||'') +
      '&contractEnd=' + encodeURIComponent(dates.contractEnd||'') +
      (newItem    !== undefined ? '&newItem='        + encodeURIComponent(newItem||'')       : '') +
      (newCampStatus !== undefined ? '&newCampStatus=' + encodeURIComponent(newCampStatus||'') : '');
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timeoutId); delete window[cbName]; script.remove();
      alert('GAS мҡ”мІӯ мҳӨлҘҳ.');
      resolve(null);
    };
    document.head.appendChild(script);
  });
}

let allMonthMap = {};
let allMonthlySorted = [];
function rebuildGlobals() {

}

// в”Җв”Җв”Җ Process Data в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function processData(yearFilter) {
  const rows = yearFilter==='all' ? RAW : RAW.filter(r => r[4]===yearFilter);
  const monthMap = {};
  rows.forEach(r => {
    const k = r[0];
    if (!monthMap[k]) monthMap[k] = {ym:k, year:r[4], month:r[5], totalIn:0, totalOut:0, gp:0, clients:{}};
    monthMap[k].totalIn += r[6]; monthMap[k].totalOut += r[7]; monthMap[k].gp += r[8];
    const cn = r[1];
    if (!monthMap[k].clients[cn]) monthMap[k].clients[cn] = {brand:r[2], squad:r[3], gp:0, inAmt:0};
    monthMap[k].clients[cn].gp += r[8]; monthMap[k].clients[cn].inAmt += r[6];
  });
  const monthly = Object.values(monthMap).sort((a,b) => a.year===b.year ? a.month-b.month : a.year.localeCompare(b.year));
  let cum = 0;
  monthly.forEach(m => { cum += m.gp; m.cumGP = cum; });
  const getPrevFromAll = (ym) => {
    const idx = allMonthlySorted.findIndex(m => m.ym === ym);
    return idx > 0 ? allMonthlySorted[idx-1] : null;
  };
  // мөңк·ј 2к°ңмӣ” лӮҙ мЎҙмһ¬н–ҲлҚҳ кі к°қмӮ¬ Set
  const getRecentClients = (ym) => {
    const idx = allMonthlySorted.findIndex(m => m.ym === ym);
    const recent = new Set();
    for (let i = Math.max(0, idx-2); i < idx; i++) {
      Object.keys(allMonthlySorted[i].clients).forEach(c => recent.add(c));
    }
    return recent;
  };
  // н•ҙлӢ№ мӣ” мқҙм „м—җ н•ң лІҲмқҙлқјлҸ„ л“ұмһҘн•ң м Ғ мһҲлҠ” кі к°қмӮ¬ Set (м „мІҙ мқҙл Ҙ)
  const getAllPastClients = (ym) => {
    const idx = allMonthlySorted.findIndex(m => m.ym === ym);
    const past = new Set();
    for (let i = 0; i < idx; i++) {
      Object.keys(allMonthlySorted[i].clients).forEach(c => past.add(c));
    }
    return past;
  };
  // кі к°қ мғҒнғң: C=кё°мЎҙ, N=мӢ к·ң(мІ«л“ұмһҘ), R=ліөк·Җ(2к°ңмӣ”+кіөл°ұнӣ„ мһ¬м§„н–ү)
  const getClientStatus = (name, recentSet, pastSet) => {
    if (recentSet.has(name)) return 'C';
    if (pastSet.has(name)) return 'R';
    return 'N';
  };
  // нҠ№м • мӣ” мқҙнӣ„м—җ лӢӨмӢң л“ұмһҘн•ҳлҠ” кі к°қмӮ¬ Set (кіөл°ұ нӣ„ ліөк·Җн•ҳлҠ” мә нҺҳмқё м ңмҷёмҡ©)
  const getFutureClients = (ym) => {
    const idx = monthly.findIndex(m => m.ym === ym);
    const futureClients = new Set();
    for (let i = idx + 1; i < monthly.length; i++) {
      Object.keys(monthly[i].clients).forEach(c => futureClients.add(c));
    }
    return futureClients;
  };
  const waterfall = monthly.map((curr) => {
    const prev = getPrevFromAll(curr.ym);
    const cc = new Set(Object.keys(curr.clients));
    const pc = prev ? new Set(Object.keys(prev.clients)) : new Set();
    const rc = getRecentClients(curr.ym);
    const ap = getAllPastClients(curr.ym);
    const fc = getFutureClients(curr.ym);
    let newGP=0, reGP=0, contChg=0, endGP=0;
    cc.forEach(c => {
      const st = getClientStatus(c, rc, ap);
      if(st==='N') newGP+=curr.clients[c].gp;
      else if(st==='R') reGP+=curr.clients[c].gp;
      else if(prev?.clients[c]) contChg+=curr.clients[c].gp-(prev.clients[c]?.gp||0);
      else contChg+=curr.clients[c].gp;
    });
    if(prev) pc.forEach(c => { if(!cc.has(c) && !fc.has(c)) endGP-=prev.clients[c].gp; });
    return {ym:curr.ym, gp:curr.gp, newGP, reGP, contChg, endGP};
  });
  const getPortfolio = idx => {
    const m = monthly[idx]; if(!m) return {active:[], ended:[]};
    const prev = getPrevFromAll(m.ym);
    const rc = getRecentClients(m.ym);
    const ap = getAllPastClients(m.ym);
    const active = Object.entries(m.clients).map(([n,d]) => ({
      name:n, brand:d.brand, squad:d.squad, gp:d.gp, inAmt:d.inAmt,
      status: getClientStatus(n, rc, ap),
      chg: prev?.clients[n] ? d.gp - prev.clients[n].gp : null
    })).sort((a,b) => b.gp - a.gp);
    const fc = getFutureClients(m.ym);
    const ended = prev ? Object.entries(prev.clients).filter(([n])=>!m.clients[n] && !fc.has(n)).map(([n,d])=>({name:n,brand:d.brand,gp:d.gp})) : [];
    return {active, ended};
  };
  const getCSMData = idx => {
    const m = monthly[idx]; if(!m) return [];
    const prev = getPrevFromAll(m.ym);
    const rc = getRecentClients(m.ym);
    const ap = getAllPastClients(m.ym);
    const curClients = new Set(Object.keys(m.clients));
    const csmMap = {};
    rows.filter(r=>r[0]===m.ym).forEach(r => {
      const sq = r[3];
      if(!csmMap[sq]) csmMap[sq] = {name:sq, gp:0, inAmt:0, clients:{}, newCount:0, reCount:0, endedCount:0, endedList:[]};
      csmMap[sq].gp += r[8]; csmMap[sq].inAmt += r[6];
      if(!csmMap[sq].clients[r[1]]) csmMap[sq].clients[r[1]] = {brand:r[2], squad:sq, gp:0, statusTag:'C'};
      csmMap[sq].clients[r[1]].gp += r[8];
    });
    Object.values(csmMap).forEach(csm => {
      Object.keys(csm.clients).forEach(cn => {
        const st = getClientStatus(cn, rc, ap);
        csm.clients[cn].statusTag = st;
        if(st==='N') csm.newCount++;
        else if(st==='R') csm.reCount++;
      });
    });
    if(prev) {
      const fc = getFutureClients(m.ym);
      const prevRows = RAW.filter(r=>r[0]===prev.ym);
      const seen = new Set();
      prevRows.forEach(r => {
        if(!curClients.has(r[1]) && !fc.has(r[1]) && !seen.has(r[1]+'||'+r[3])) {
          seen.add(r[1]+'||'+r[3]);
          const sq = r[3];
          if(!csmMap[sq]) csmMap[sq] = {name:sq, gp:0, inAmt:0, clients:{}, newCount:0, endedCount:0, endedList:[]};
          csmMap[sq].endedCount++;
          csmMap[sq].endedList.push({name:r[1], brand:r[2], gp: prev.clients[r[1]]?.gp||0});
        }
      });
    }
    const prevCsmGP = {};
    if(prev) { RAW.filter(r=>r[0]===prev.ym).forEach(r => { prevCsmGP[r[3]] = (prevCsmGP[r[3]]||0) + r[8]; }); }
    return Object.values(csmMap).map(c => ({
      ...c, clientCount: Object.keys(c.clients).length,
      clientList: Object.entries(c.clients).map(([n,d])=>({name:n,...d})).sort((a,b)=>b.gp-a.gp),
      prevGP: prevCsmGP[c.name]||null
    })).sort((a,b) => b.gp - a.gp);
  };
  const getHeatmap = () => {
    const clientMonthGP = {};
    const clientMonthIn = {};
    const allClients = new Set();
    rows.forEach(r => {
      allClients.add(r[1]);
      const key = r[1]+'||'+r[0];
      clientMonthGP[key] = (clientMonthGP[key]||0) + r[8];
      clientMonthIn[key] = (clientMonthIn[key]||0) + r[6];
    });
    const clients = [...allClients].map(cn => {
      const monthGPs = monthly.map(m => clientMonthGP[cn+'||'+m.ym]||0);
      const monthIns = monthly.map(m => clientMonthIn[cn+'||'+m.ym]||0);
      const total = monthGPs.reduce((s,v)=>s+v,0);
      return {name:cn, monthGPs, monthIns, total};
    }).sort((a,b) => b.total - a.total);
    return {clients, months: monthly.map(m=>m.ym)};
  };
  // в”Җв”Җв”Җ Product Analysis (NEW) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
  const getProductAnalysis = () => {
    const hasProds = Object.keys(PRODUCT_MAP).length > 0;
    // мғҒн’Ҳ лҚ°мқҙн„°(PRODUCT_MAP)к°Җ м—Ҷмңјл©ҙ л№Ҳ мғҒнғң л°ҳнҷҳ вҖ” лёҢлһңл“ңлЎң лҢҖмІҙн•ҳм§Җ м•ҠмқҢ
    if (!hasProds) {
      return {months: monthly.map(m=>m.ym), products: [], data: {}, hasProds: false,
              insights: {topGrowth:null, topDecline:null, newProds:[], topProd:null, lastYm:null, prevYm:null}};
    }
    const monthlyProd = {};
    monthly.forEach(m => { monthlyProd[m.ym] = {}; });
    rows.forEach(r => {
      // r = [ym, client, brand, squad, year, month, inAmt, outAmt, gp]
      const prods = getProducts(r[1], r[2], r[3], r[4], r[5]);
      if (!monthlyProd[r[0]]) return;
      prods.forEach(p => {
        if (!monthlyProd[r[0]][p.name]) monthlyProd[r[0]][p.name] = {count:0, gp:0, inAmt:0};
        monthlyProd[r[0]][p.name].count++;
        monthlyProd[r[0]][p.name].gp += p.gp;
        monthlyProd[r[0]][p.name].inAmt += p.inAmt;
      });
    });
    // Get top products by total GP
    const totals = {};
    Object.values(monthlyProd).forEach(prods => {
      Object.entries(prods).forEach(([name, d]) => {
        if (!totals[name]) totals[name] = {gp:0, count:0};
        totals[name].gp += d.gp;
        totals[name].count += d.count;
      });
    });
    const TOP_N = 12;
    const sorted = Object.entries(totals).sort((a,b) => Math.abs(b[1].gp) - Math.abs(a[1].gp));
    const topProds = sorted.slice(0, TOP_N).map(([n]) => n);
    const hasOthers = sorted.length > TOP_N;
    // Regroup
    const regrouped = {};
    monthly.forEach(m => {
      regrouped[m.ym] = {};
      topProds.forEach(p => { regrouped[m.ym][p] = monthlyProd[m.ym][p] || {count:0, gp:0, inAmt:0}; });
      if (hasOthers) {
        regrouped[m.ym]['кё°нғҖ'] = {count:0, gp:0, inAmt:0};
        Object.entries(monthlyProd[m.ym]).forEach(([name, d]) => {
          if (!topProds.includes(name)) {
            regrouped[m.ym]['кё°нғҖ'].count += d.count;
            regrouped[m.ym]['кё°нғҖ'].gp += d.gp;
            regrouped[m.ym]['кё°нғҖ'].inAmt += d.inAmt;
          }
        });
      }
    });
    const allProds = hasOthers ? [...topProds, 'кё°нғҖ'] : topProds;
    // Compute insights
    const lastYm = monthly.length > 0 ? monthly[monthly.length-1].ym : null;
    const prevYm = monthly.length > 1 ? monthly[monthly.length-2].ym : null;
    let topGrowth = null, topDecline = null, newProds = [], topProd = null;
    if (lastYm && prevYm) {
      const curP = monthlyProd[lastYm] || {};
      const prevP = monthlyProd[prevYm] || {};
      let maxGrow = -Infinity, maxDecl = Infinity;
      const allNames = new Set([...Object.keys(curP), ...Object.keys(prevP)]);
      allNames.forEach(name => {
        const curGP = curP[name]?.gp || 0;
        const prevGP = prevP[name]?.gp || 0;
        const diff = curGP - prevGP;
        if (curGP > 0 && diff > maxGrow) { maxGrow = diff; topGrowth = {name, curGP, prevGP, diff}; }
        if (prevGP > 0 && diff < maxDecl) { maxDecl = diff; topDecline = {name, curGP, prevGP, diff}; }
        if (curGP > 0 && !prevP[name]) newProds.push({name, gp: curGP});
      });
    }
    if (lastYm) {
      const curP = monthlyProd[lastYm] || {};
      let maxGP = -Infinity;
      Object.entries(curP).forEach(([name, d]) => {
        if (d.gp > maxGP) { maxGP = d.gp; topProd = {name, gp: d.gp, count: d.count}; }
      });
    }
    return {months: monthly.map(m=>m.ym), products: allProds, data: regrouped, hasProds,
            insights: {topGrowth, topDecline, newProds, topProd, lastYm, prevYm}};
  };
  const totalGP = monthly.reduce((s,m)=>s+m.gp,0);
  // в”Җв”Җв”Җ CSM Resource Calendar в”Җв”Җв”Җ
  const getCSMCalendar = () => {
    // Build: CSM вҶ’ [ {client, brand, months:[ym,...]} ]
    const csmClients = {}; // squad вҶ’ client|brand вҶ’ Set(ym)
    rows.forEach(r => {
      const sq = r[3], client = r[1], brand = r[2], ym = r[0];
      if (!sq) return;
      if (!csmClients[sq]) csmClients[sq] = {};
      const key = client + '|' + brand;
      if (!csmClients[sq][key]) csmClients[sq][key] = {client, brand, yms: new Set(), gpTotal: 0};
      csmClients[sq][key].yms.add(ym);
      csmClients[sq][key].gpTotal += r[8];
    });
    const allYms = monthly.map(m => m.ym);
    const calColors = ['#6366f1','#22d3ee','#f59e0b','#10b981','#f87171','#a78bfa','#fb923c','#ec4899','#84cc16','#06b6d4'];
    const csmList = Object.entries(csmClients).map(([sq, clients]) => {
      const entries = Object.values(clients).sort((a, b) => b.gpTotal - a.gpTotal);
      const totalClients = entries.length;
      const activeMonths = new Set();
      entries.forEach(e => e.yms.forEach(ym => activeMonths.add(ym)));
      return { name: sq, entries, totalClients, activeMonthCount: activeMonths.size };
    }).sort((a, b) => b.entries.reduce((s, e) => s + e.gpTotal, 0) - a.entries.reduce((s, e) => s + e.gpTotal, 0));
    return { csmList, allYms, calColors };
  };
  return {monthly, waterfall, getPortfolio, getCSMData, getHeatmap, getProductAnalysis, getCSMCalendar, totalGP};
}

function drawGauge(canvas, pct) {

// в”Җв”Җв”Җ Past/Future Month Helper в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function isFutureMonth(ym) {
  // ym format: "25л…„ 03мӣ”" вҶ’ parse to compare with current date
  const m = ym.match(/(\d+)л…„\s*(\d+)мӣ”/);
  if (!m) return false;
  const y = 2000 + parseInt(m[1]);
  const mo = parseInt(m[2]);
  const now = new Date();
  const curY = now.getFullYear();
  const curM = now.getMonth() + 1;
  return (y > curY) || (y === curY && mo > curM);
}
function isCurrentMonth(ym) {
  const m = ym.match(/(\d+)л…„\s*(\d+)мӣ”/);
  if (!m) return false;
  const y = 2000 + parseInt(m[1]);
  const mo = parseInt(m[2]);
  const now = new Date();
  return y === now.getFullYear() && mo === (now.getMonth() + 1);
}

    { label:'лҲ„м Ғ л§Өм¶ңмҙқмқҙмқө', data:cumGPs, borderColor:'#6366f1', backgroundColor:'rgba(99,102,241,0.18)', fill:true, tension:0.3, pointRadius:4, pointBackgroundColor:cumPointColors, borderWidth:2.5, segment: { borderDash: cumSegmentStyle, borderColor: cumSegmentColor }, order:1 },
    { label:'лӘ©н‘ң лҲ„м Ғ лқјмқё', data:cumTargets, borderColor:'#f59e0b', borderDash:[6,4], pointRadius:0, borderWidth:2, fill:false, order:0 }
  ]}, options: { responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false}, plugins:{legend:{position:'bottom', labels:{color:'#94a3b8', font:{size:11}, boxWidth:14, padding:14, usePointStyle:true}},tooltip:{

function renderWaterfall(canvas, waterfall) {
  if(wfChart) wfChart.destroy();
  const wfFuture = waterfall.map(w => isFutureMonth(w.ym));
  const wfOpacity = (base, isFut) => {
    if (!isFut) return base;
    if (base.startsWith('#')) {
      const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+',0.3)';
    }
    return base.replace(/[\d.]+\)$/,'0.3)');
  };
  const wfGPArr = waterfall.map(w => w.gp);
  // м–ө лӢЁмң„ нҸ¬л§·: в–ІX.XXм–ө
  const fmtEok = (v) => (Math.abs(v) / 1e8).toFixed(2) + 'м–ө';
  const wfMomLabels = wfGPArr.map((gp, i) => {
    if (i === 0) return null;
    const diff = gp - wfGPArr[i-1];
    if (diff === 0) return null;
    return { diff, label: (diff >= 0 ? 'в–І' : 'в–ј') + fmtEok(diff) };
  });
  wfChart = new Chart(canvas, { type:'bar', data: { labels: waterfall.map(w=>w.ym), datasets: [
    { label:'мӢ к·ң мң мһ…', data:waterfall.map(w=>w.newGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#10b981',wfFuture[i])), borderRadius:3 },
    { label:'ліөк·Җ', data:waterfall.map(w=>w.reGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#38bdf8',wfFuture[i])), borderRadius:3 },
    { label:'кё°мЎҙ кі к°қ ліҖлҸҷ', data:waterfall.map(w=>w.contChg), backgroundColor:waterfall.map((w,i)=>wfOpacity(w.contChg>=0?'#f59e0b':'#fb923c',wfFuture[i])), borderRadius:3 },
    { label:'мў…лЈҢВ·мқҙнғҲ', data:waterfall.map(w=>w.endGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#ef4444',wfFuture[i])), borderRadius:3 }
  ]}, options: { responsive:true, maintainAspectRatio:false,
    interaction: { mode:'index', intersect:false },
    plugins:{
      legend:{position:'bottom', labels:{color:'#94a3b8', font:{size:11}, boxWidth:12, padding:12}},
      tooltip:{
        callbacks:{
          title: items => items[0]?.label + (isFutureMonth(items[0]?.label) ? ' (мҳҲм •)' : ''),
          label: () => null,
          afterBody: items => {
            const idx = items[0]?.dataIndex;
            if (idx === undefined) return [];
            const w = waterfall[idx];
            const fut = isFutureMonth(w.ym) ? ' (мҳҲм •)' : '';
            // л¶ҖнҳёлҘј н•ӯмғҒ м•һм—җ, мӣҗнҷ”кё°нҳёлҸ„ м•һм—җ: +вӮ©XXX / -вӮ©XXX
            const signFmt = v => (v >= 0 ? '+' : '-') + 'вӮ©' + Math.round(Math.abs(v)).toLocaleString();
            const prevGP = idx > 0 ? wfGPArr[idx - 1] : null;
            const diff = prevGP !== null ? w.gp - prevGP : null;
            const diffPct = (diff !== null && prevGP !== 0) ? (diff / Math.abs(prevGP) * 100).toFixed(1) : null;
            const lines = [
              '  мӢ к·ң мң мһ…:    ' + signFmt(w.newGP),
              '  ліөк·Җ:        ' + signFmt(w.reGP),
              '  кё°мЎҙ кі к°қ:   ' + signFmt(w.contChg),
              '  мў…лЈҢВ·мқҙнғҲ:  ' + signFmt(w.endGP),
              'в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ',
            ];
            if (diff !== null) {
              lines.push('  м „мӣ” лҢҖл№„:  ' + signFmt(diff) + (diffPct !== null ? '  (' + (diff >= 0 ? '+' : '') + diffPct + '%)' : '') + fut);
            } else {
              lines.push('  мІ« лӢ¬ кё°мӨҖ' + fut);
            }
            return lines;
          }
        }
      }
    },
    scales:{
      x:{stacked:true, ticks:{color:waterfall.map(w=>isFutureMonth(w.ym)?'rgba(148,163,184,0.4)':'#94a3b8')}},
      y:{stacked:true, ticks:{callback:v=>fmt(v)}, grid:{color:'rgba(100,116,139,0.15)'}}
    },
    layout: { padding: { top: 28 } }
  },
  plugins: [{
    id: 'wfLabels',
    // afterDatasetsDraw: нҲҙнҢҒліҙлӢӨ лЁјм Җ к·ёл Өм ём„ң л§Ҳмҡ°мҠӨмҳӨлІ„ мӢң нҲҙнҢҒмқҙ л Ҳмқҙлё” мң„м—җ н‘ңмӢңлҗЁ
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      ctx.save();
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      wfMomLabels.forEach((item, i) => {
        if (!item) return;
        let topY = Infinity, barX = null;
        [0,1,2,3].forEach(dsIdx => {
          const m = chart.getDatasetMeta(dsIdx);
          if (m && m.data[i]) {
            if (m.data[i].y < topY) topY = m.data[i].y;
            if (barX === null) barX = m.data[i].x;
          }
        });
        if (topY === Infinity || barX === null) return;
        ctx.fillStyle = item.diff >= 0 ? '#4ade80' : '#f87171';
        ctx.fillText(item.label, barX, topY - 4);
      });
      ctx.restore();
    }
  }]
  });
}

function heatColor(val, maxVal) {
  if(val===0) return 'transparent';
  if(val<0) return 'rgba(239,68,68,'+(0.4+Math.min(Math.abs(val)/maxVal,1)*0.6).toFixed(2)+')';
  const logVal = Math.log10(val+1);
  const logMax = Math.log10(maxVal+1);
  const ratio = logMax>0 ? logVal/logMax : 0;
  const intensity = 0.12 + ratio * 0.88;
  const r = Math.round(79 - ratio*30);
  const g = Math.round(70 - ratio*20);
  const b = Math.round(229 + ratio*20);
  return 'rgba('+r+','+g+','+Math.min(b,255)+','+intensity.toFixed(2)+')';
}

            '</div>';
            // в”Җв”Җв”Җ Day index helper в”Җв”Җв”Җ

              // Adjust phases so they don't overlap: trim previous phase end to 1 day before next phase start
              for (let i = 0; i < phases.length - 1; i++) {

                  const trimEnd = new Date(new Date(phases[i+1].start).getTime() - 86400000).toISOString().slice(0,10);

        // hmмқҖ мқҙлҜё currentYearлЎң н•„н„°лҗң rowsм—җм„ң л§Ңл“Өм–ҙм§җ вҶ’ GPлҠ” мқҙлҜё н•„н„°лҗЁ
        // TAX_DATAлҠ” лі„лҸ„лЎң н•„н„°н•ҙм•ј н•Ё
        const yearStr = currentYear; // '25' | '26' | 'all'

        const normYm = (s) => {
          if (s == null || s === '') return '';
          let str = String(s).trim();
          let m = str.match(/^(\d{4})[-./](\d{1,2})/);
          if (m) return m[1].slice(-2) + 'л…„ ' + String(parseInt(m[2])).padStart(2,'0') + 'мӣ”';
          m = str.match(/^(\d{2,4})\s*л…„\s*(\d{1,2})\s*мӣ”/);
          if (m) return (m[1].length === 4 ? m[1].slice(-2) : m[1].padStart(2,'0')) + 'л…„ ' + String(parseInt(m[2])).padStart(2,'0') + 'мӣ”';
          m = str.match(/Date\((\d+),(\d+)/);
          if (m) return String(m[1]).slice(-2) + 'л…„ ' + String(parseInt(m[2])+1).padStart(2,'0') + 'мӣ”';
          return str;
        };
        const normYear = (d) => {
          // мҡ°м„ мҲңмң„: d.year вҶ’ м •к·ңнҷ”лҗң ymм—җм„ң м¶”м¶ң
          let y = String(d.year || '').replace(/['"]/g,'').trim();
          if (y.length === 4) y = y.slice(-2);
          if (y) return y;
          const ny = normYm(d.ym);
          const m = ny.match(/^(\d{2})л…„/);
          return m ? m[1] : '';
        };
        // вҡ пёҸ мӢӨм ң м„ёл°ң л°ңн–үлҗң кұҙл§Ң (Oм—ҙ = invoiceInfo === true) нҸ¬н•Ё
        const taxRows = (TAX_DATA && TAX_DATA.length)
          ? TAX_DATA.filter(d => {
              if (!d.invoiceInfo) return false;
              if (yearStr === 'all') return true;
              return normYear(d) === yearStr;
            })
          : [];
        // в”Җв”Җ нҶөн•© м»¬лҹјм¶• (GP мӣ” вҲӘ м„ёл°ң мӣ”) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        const parseYm = s => {
          const m = String(s).match(/(\d{2,4})\D+(\d{1,2})/);
          if (!m) return [9999, 99];
          return [parseInt(m[1]), parseInt(m[2])];
        };
        const ymSet = new Set(hm.months);
        taxRows.forEach(d => {
          const ny = normYm(d.ym);
          if (ny) ymSet.add(ny);
        });
        const allMonths = [...ymSet].sort((a,b) => {
          const [ay,am] = parseYm(a), [by,bm] = parseYm(b);
          return ay === by ? am - bm : ay - by;

        // в”Җв”Җ GP / л§Өм¶ң(In) лҚ°мқҙн„°(client Г— ym) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
        const gpMap = {};

          c.monthGPs.forEach((v, i) => { gpMap[c.name+'||'+hm.months[i]] = v; });

        const taxMap = {};

        hm.clients.forEach(c => clientSet.add(c.name));
        Object.keys(taxMap).forEach(k => clientSet.add(k.split('||')[0]));
        const combined = [...clientSet].map(cn => {
          const gpArr = allMonths.map(ym => gpMap[cn+'||'+ym] || 0);
          const inArr = allMonths.map(ym => inMap[cn+'||'+ym] || 0);
          const taxArr = allMonths.map(ym => taxMap[cn+'||'+ym] || 0);
          const gpTotal = gpArr.reduce((s,v)=>s+v, 0);
          const taxTotal = taxArr.reduce((s,v)=>s+v, 0);
          return {name: cn, gpArr, inArr, taxArr, gpTotal, taxTotal};
        }).filter(c => c.gpTotal !== 0 || c.taxTotal !== 0)
          .sort((a,b) => b.gpTotal - a.gpTotal);
        const maxVal = Math.max(
          ...combined.map(c => Math.max(...c.gpArr, 0)),
          1
        );
        const colGPTotals = allMonths.map((_, i) => combined.reduce((s,c) => s + c.gpArr[i], 0));
        const grandGP = colGPTotals.reduce((s,v)=>s+v, 0);
        const yearLabelHm = yearStr==='25'?'2025л…„':yearStr==='26'?'2026л…„':'м „мІҙ';
        return '<div class="card">' +

          '<p class="sub">м…Җ мғүмғҒ лҶҚлҸ„ = л§Өм¶ңмҙқмқҙмқө(GP) нҒ¬кё° В· мғҒлӢЁ м—°лҸ„ лІ„нҠјмңјлЎң н•„н„° В· кі к°қмӮ¬лҘј нҒҙлҰӯн•ҳл©ҙ <span style="color:#34d399">л§Өм¶ң</span> / <span style="color:#a5b4fc">л§Өм¶ңмҙқмқҙмқө</span> / <span style="color:#fbbf24">м„ёл°ң(VAT-)</span> м¶”мқҙ к·ёлһҳн”„к°Җ н•Ёк»ҳ н‘ңмӢңлҗ©лӢҲлӢӨ</p>' +
          '<div class="heatmap-wrap">' +
            '<table class="heatmap-table">' +
              '<thead><tr><th>кі к°қмӮ¬</th>' + allMonths.map(m => '<th>'+m.replace(/л…„ /,'.')+'</th>').join('') + '<th class="hm-total">н•©кі„</th></tr></thead>' +
              '<tbody>' +
              combined.map(c => {
                const esc = c.name.replace(/'/g,"\\'").replace(/"/g,'&quot;');
                const mJson = JSON.stringify(allMonths).replace(/"/g,'&quot;');
                const gJson = JSON.stringify(c.gpArr);

                return '<tr id="hm-row-'+safeName+'" style="cursor:pointer" onclick="toggleHeatmapClient(\''+esc+'\','+mJson+','+gJson+','+iJson+','+tJson+')">' +

                '<td class="hm-total" style="color:#a5b4fc">'+fmt(grandGP)+'</td></tr>' +
              '</tbody>' +
            '</table>' +

          (taxRows.length ? '' : '<p style="color:#94a3b8;font-size:12px;margin-top:12px">в„№пёҸ м„ нғқн•ң м—°лҸ„мқҳ м„ёкёҲкі„мӮ°м„ң(м„ёл°ң) лҚ°мқҙн„°к°Җ м—Ҷкұ°лӮҳ м•„м§Ғ лЎңл“ңлҗҳм§Җ м•Ҡм•ҳмҠөлӢҲлӢӨ. нҒҙлҰӯ мӢң м„ёл°ң лқјмқёмқҖ 0мңјлЎң н‘ңмӢңлҗ©лӢҲлӢӨ.</p>') +

      })()}

function testSheetAccess() {

    if (done) return; done = true; delete window[cbName];

      'вҖў мӢңнҠё ID мҳӨлҘҳ вҶ’ нҳ„мһ¬ ID: <code>'+sheetId+'</code><br>' +

  }, 15000);
  window[cbName] = function(resp) {

      resultEl.innerHTML = 'вқҢ <b>Google API м—җлҹ¬:</b> '+err+'<br>' +
        'вҖў мӢңнҠё кіөк°ң м„Өм •мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”<br>' +
        'вҖў <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">лёҢлқјмҡ°м Җм—җм„ң м§Ғм ‘ нҷ•мқё</a>';
    } else {
      resultEl.innerHTML = 'вҡ пёҸ мқ‘лӢөмқҖ л°ӣм•ҳмңјлӮҳ мҳҲмғҒкіј лӢӨлҘё нҳ•мӢқмһ…лӢҲлӢӨ.';
    }
  };
  // google.visualization.Query.setResponse лқјмҡ°нҢ…
  _pendingJsonpCb = cbName;
  const s = document.createElement('script');
  s.src = testUrl + '&tqx=responseHandler:'+cbName;
  s.onerror = () => {
    if (done) return; done = true; clearTimeout(timer); delete window[cbName];
    resultEl.innerHTML = 'вқҢ <b>мҠӨнҒ¬лҰҪнҠё лЎңл“ң мӢӨнҢЁ</b><br>' +
      'вҖў л„ӨнҠёмӣҢнҒ¬ м—°кІ° нҷ•мқё<br>' +
      'вҖў мӢңнҠё ID нҷ•мқё: <code>'+sheetId+'</code><br>' +
      'вҖў <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">м§Ғм ‘ нҷ•мқё л§ҒнҒ¬</a>';
  };
  document.body.appendChild(s);
}
function togglePasteUI() {
  const el = document.getElementById('pastePanel');
  if(el) el.style.display = el.style.display==='none'?'block':'none';
}
// в”Җв”Җв”Җ лЎңм»¬ нҢҢмқјм—җм„ң gviz JSON лЎңл“ң (file:// нҷҳкІҪмҡ©) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function loadFromFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('fileLoadStatus');
  if (statusEl) statusEl.textContent = 'рҹ“Ӯ '+file.name+' мқҪлҠ” мӨ‘...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      // google.visualization.Query.setResponse(...) лһҳнҚј м ңкұ°
      text = text.replace(/^\/\*O_o\*\/\s*/, '');
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
      if (match) text = match[1];
      // лҳҗлҠ” мҲңмҲҳ JSONмқј мҲҳ мһҲмқҢ
      const data = JSON.parse(text);
      if (!data.table || !data.table.rows) {
        if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">вқҢ мң нҡЁн•ҳм§Җ м•ҠмқҖ gviz нҳ•мӢқ</span>';
        return;
      }
      dbg('рҹ“Ӯ нҢҢмқј лЎңл“ң: '+file.name+' ('+data.table.rows.length+'н–ү, '+data.table.cols.length+'м—ҙ)');
      if (type === 'main') {
        const parsed = parseGvizResponse(data, 'main');
        if (parsed && parsed.rows && parsed.rows.length > 0) {
          RAW.length = 0;
          parsed.rows.forEach(r => RAW.push(r));
          dataSource = 'sheets';
          lastUpdateTime = new Date();
          rebuildGlobals();
          render();
          dbg('вң… л©”мқё нҢҢмқј лЎңл“ң мҷ„лЈҢ: '+parsed.rows.length+'н–ү');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">вң… л©”мқё лҚ°мқҙн„° '+parsed.rows.length+'н–ү лЎңл“ң мҷ„лЈҢ!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">вқҢ нҢҢмӢұ мӢӨнҢЁ вҖ” мӢңнҠё нҳ•мӢқ нҷ•мқё</span>';
        }
      } else if (type === 'cashflow') {
        const prodMap = parseCashflowForProducts(data);
        if (prodMap && Object.keys(prodMap).length > 0) {
          PRODUCT_MAP = prodMap;
          render();
          dbg('вң… Cashflow нҢҢмқј лЎңл“ң мҷ„лЈҢ: '+Object.keys(prodMap).length+'к°ң мғҒн’Ҳ нӮӨ');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">вң… мғҒн’Ҳ лҚ°мқҙн„° '+Object.keys(prodMap).length+'к°ң нӮӨ лЎңл“ң!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">вқҢ cashflow нҢҢмӢұ мӢӨнҢЁ</span>';
        }
      }
      updateDebugPanel();
    } catch(err) {
      dbg('вқҢ нҢҢмқј нҢҢмӢұ м—җлҹ¬: '+err.message);
      if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">вқҢ JSON нҢҢмӢұ м—җлҹ¬: '+err.message+'</span>';
      updateDebugPanel();
    }
  };
  reader.readAsText(file);
}
function updateJsonLinks() {
  const sheetId = extractSheetId(SHEETS_ID);
  if (!sheetId) return;
  const mainLink = document.getElementById('mainJsonLink');
  const cfLink = document.getElementById('cfJsonLink');
  if (mainLink) mainLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID;
  // cashflow gid: localStorageм—җ м ҖмһҘлҗң к°’ лҳҗлҠ” кё°ліёк°’
  const cfGid = localStorage.getItem('tkcle_cashflow_gid') || '0';
  if (cfLink) cfLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+cfGid;
}
// Only auto-load if already authenticated (session persists on refresh)
if (sessionStorage.getItem('tkcle_auth') === '1') {
  loadData(true).then(()=>{updateDebugPanel();updateJsonLinks();});
}
</script>
