<body>
<!-- Password Lock Screen -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>TikCle Dashboard</h2>
    <p>접근하려면 비밀번호를 입력하세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="off"
      onkeydown="if(event.key==='Enter')unlockDashboard()">
    <button onclick="unlockDashboard()">확인</button>
    <div class="error-msg" id="pwError"></div>
  </div>
</div>
<div id="app" style="display:none">
  <div style="text-align:center;padding:60px;color:#64748b;font-size:16px;">데이터를 로드하는 중...</div>
</div>
<script>
// ─── Password Protection ───
const _PW_HASH = '1f7192c8';
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(16).slice(0, 8);
}
function unlockDashboard() {
  const input = document.getElementById('pwInput').value;
  if (simpleHash(input) === _PW_HASH) {
    sessionStorage.setItem('tkcle_auth', '1');
    document.getElementById('lockScreen').classList.add('fade-out');
    document.getElementById('app').style.display = '';
    setTimeout(() => { document.getElementById('lockScreen').remove(); }, 500);
    if (typeof loadData === 'function') loadData(true).then(()=>{if(typeof updateDebugPanel==='function')updateDebugPanel();if(typeof updateJsonLinks==='function')updateJsonLinks();});
  } else {
    document.getElementById('pwInput').classList.add('shake');
    document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다';
    setTimeout(() => { document.getElementById('pwInput').classList.remove('shake'); }, 400);
  }
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('tkcle_auth') === '1') {
  document.getElementById('lockScreen').remove();
  document.getElementById('app').style.display = '';
}
</script>

// ─── PRODUCT NORMALIZATION ────────────────────────────────────────
function normalizeProduct(name) {
  if (!name) return '기타';
  const n = name.trim();
  if (n.includes('무가') || n.includes('아마존 중동') || n.includes('POC')) return '대량무가';
  if (n.includes('유가') || n.includes('2차 활용')) return '유가';

  return '기타';

    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}
// ─── Google Sheets JSONP (gviz API) ──────────────────────────────
function fetchViaJSONP(sheetId, gid) {
  gid = gid || 0;
  const url = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+gid+'&_='+Date.now();
  dbg('📡 JSONP 요청: gid='+gid+' sheetId='+sheetId.substring(0,12)+'...');
  return loadJSONP(url, 15000).then(resp => {
    if (!resp) return null;
    return parseGvizResponse(resp);
  });
}
// ─── CSV Fallback ────────────────────────────────────────────────
async function fetchViaCSV(sheetId, gid) {
  gid = gid || 0;
  // 1차: gviz CSV endpoint
  const url1 = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:csv&gid='+gid;
  // 2차: export endpoint (다른 CORS 정책일 수 있음)
  const url2 = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/export?format=csv&gid='+gid;
  const isFileProtocol = location.protocol === 'file:';
  if (isFileProtocol) {
    dbg('⚠️ file:// 프로토콜 감지 → CSV fetch 불가 (CORS 제한). JSONP 또는 GAS 사용 권장');
    return null;
  }
  for (const [label, url] of [['gviz CSV', url1], ['export CSV', url2]]) {
    dbg('📡 '+label+' 요청: gid='+gid);
    try {
      const resp = await fetch(url);
      if (!resp.ok) { dbg('❌ '+label+' HTTP '+resp.status); continue; }
      const text = await resp.text();
      if (text.includes('<!DOCTYPE html>') || text.includes('<html')) { dbg('❌ '+label+' → HTML 응답 (권한 문제)'); continue; }
      const rows = parseCSV(text);
      if (rows && rows.length > 0) { dbg('✅ '+label+' 파싱: '+rows.length+'행'); return rows; }
      dbg('⚠️ '+label+' → 0행');
    } catch(e) { dbg('❌ '+label+' fetch error: '+e.message); }
  }
  return null;
}
// ─── GAS Proxy ───────────────────────────────────────────────────
function fetchViaGAS(gasUrl, sheetId, gid) {
  gid = gid || 0;
  dbg('📡 GAS 요청: gid='+gid+' url='+gasUrl.substring(0,40)+'...');
  // GAS 프록시는 callback 파라미터를 직접 URL에 넣음
  return new Promise((resolve) => {
    const cbName = '_gas_' + (++_jsonpCounter) + '_' + Date.now();
    const timeoutId = setTimeout(() => {
      dbg('⏱ GAS timeout (20s)');
      delete window[cbName]; resolve(null);
    }, 20000);
    window[cbName] = function(response) {
      clearTimeout(timeoutId);
      delete window[cbName];
      dbg('✅ GAS 응답 수신');
      // GAS 프록시가 gviz 형태로 반환하는 경우
      if (response && response.table) {
        resolve(parseGvizResponse(response));
      }
      // GAS 프록시가 {status, table} 형태인 경우
      else if (response && response.status === 'ok' && response.data) {
        resolve(response.data);
      }
      else if (response && response.status === 'error') {
        dbg('❌ GAS error: '+(response.message||'unknown'));
        resolve(null);
      }
      else {
        dbg('⚠️ GAS 알 수 없는 응답 형식: '+JSON.stringify(response).substring(0,100));
        resolve(null);
      }
    };
    const oldScript = document.getElementById('gas-'+cbName);
    if (oldScript) oldScript.remove();
    const script = document.createElement('script');
    script.id = 'gas-'+cbName;
    const sep = gasUrl.indexOf('?') >= 0 ? '&' : '?';
    script.src = gasUrl + sep + 'callback='+cbName+'&id='+encodeURIComponent(sheetId)+'&gid='+gid;
    script.onerror = (e) => {
      clearTimeout(timeoutId); delete window[cbName];
      dbg('❌ GAS script load error');
      resolve(null);
    };
    document.body.appendChild(script);
  });
}
// ─── Google Visualization API (공식 라이브러리, file://에서도 작동 가능) ──
function fetchViaGoogleViz(sheetId, gid) {
  gid = gid || 0;
  dbg('── Google Visualization API 시도 (gid='+gid+')');
  return new Promise((resolve) => {
    try {
      if (typeof google === 'undefined' || !google.charts) {
        dbg('⚠️ Google Charts 라이브러리 미로드');
        resolve(null); return;
      }
      google.charts.load('current');
      google.charts.setOnLoadCallback(() => {
        try {
          const url = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+gid;
          const query = new google.visualization.Query(url);
          query.setTimeout(20);
          query.send(function(response) {
            if (response.isError()) {
              dbg('❌ Google Viz error: '+response.getMessage());
              resolve(null); return;
            }
            dbg('✅ Google Viz 응답 수신');
            const dt = response.getDataTable();
            const numCols = dt.getNumberOfColumns();
            const numRows = dt.getNumberOfRows();
            dbg('   '+numRows+'행 × '+numCols+'열');
            // DataTable → gviz 호환 형식으로 변환
            const cols = []; for (let c=0;c<numCols;c++) cols.push({type:dt.getColumnType(c),label:dt.getColumnLabel(c)});
            const rows = [];
            for (let r=0;r<numRows;r++) {
              const cells = [];
              for (let c=0;c<numCols;c++) {
                const v = dt.getValue(r,c);
                const f = dt.getFormattedValue(r,c);
                cells.push({v:v, f:f||''});
              }
              rows.push({c:cells});
            }
            const fakeResp = {status:'ok', table:{cols:cols, rows:rows, parsedNumHeaders:1}};
            const parsed = parseGvizResponse(fakeResp);
            if (parsed) parsed._rawResponse = fakeResp;
            resolve(parsed);
          });
        } catch(e) { dbg('❌ Google Viz query error: '+e.message); resolve(null); }
      });
    } catch(e) { dbg('❌ Google Viz init error: '+e.message); resolve(null); }
  });
}

// ─── 인플 지급 시트(gid=1385383205) 파싱 ─────────────────────────
// 컬럼: C=고객사, D=브랜드, E=CSM, I=금액(USD), J=금액(KRW), K=지급일자
function parseInfluPayResponse(response) {
  try {
    const table = response.table;
    if (!table || !table.rows) return [];
    const data = [];
    const cClient=2, cBrand=3, cCsm=4, cYear=5, cMonth=6, cUsd=8, cKrw=9, cDate=10;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v != null ? c[idx].v : (c[idx].f || '')) : '';
      let rawDate = val(cDate);
      let dateStr = '';
      if (rawDate instanceof Date) {
        dateStr = rawDate.getFullYear()+'-'+String(rawDate.getMonth()+1).padStart(2,'0')+'-'+String(rawDate.getDate()).padStart(2,'0');
      } else if (typeof rawDate === 'string' && rawDate.startsWith('Date(')) {
        const m = rawDate.match(/Date\((\d+),(\d+),(\d+)/);
        if (m) dateStr = m[1]+'-'+String(parseInt(m[2])+1).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      } else if (rawDate) {
        const m = String(rawDate).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if (m) dateStr = m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      }
      if (!dateStr) continue;
      const krw = parseFloat(String(val(cKrw)||'').replace(/[₩,W\s]/g,'')) || 0;
      const usd = parseFloat(String(val(cUsd)||'').replace(/[$,\s]/g,'')) || 0;
      const amt = krw > 0 ? krw : Math.round(usd * FX_USD_TO_KRW);
      if (amt <= 0) continue;
      data.push({
        date: dateStr,
        ym: dateStr.slice(0,7),
        amt,
        client: String(val(cClient)||'').trim(),
        brand: String(val(cBrand)||'').trim(),
        csm: String(val(cCsm)||'').trim(),
        year: String(val(cYear)||'').replace(/['"]/g,'').trim(),
        month: parseInt(val(cMonth)) || 0,
        usdOriginal: usd,
        krwOriginal: krw > 0
      });
    }
    return data;
  } catch(e) {
    dbg('⚠️ 인플 지급 파싱 에러: '+e.message);
    return [];
  }
}
// ─── Cashflow sheet → PRODUCT_MAP 파싱 ───────────────────────────
// cashflow 시트에서 C=캠페인, D=고객사, E=브랜드, F=상품, N=연도, O=월, P=수취, Q=지급
function parseCashflowForProducts(response) {
  try {
    const table = response.table;
    const numCols = table.cols ? table.cols.length : 0;
    if (numCols < 15) return null; // cashflow 형식이 아님
    const productMap = {};
    const campList = [];
    let rowCount = 0;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v !== null && c[idx].v !== undefined ? c[idx].v : (c[idx].f || '')) : '';
      const client = String(val(2)).trim();   // C=고객사
      const brand = String(val(3)).trim();    // D=브랜드
      const product = String(val(4)).trim();  // E=상품
      const squad = String(val(6)).trim();    // G=담당스쿼드
      const country = String(val(7)).trim();  // H=국가
      const item    = String(val(8)).trim();  // I=제품
      const year = String(val(12)).replace(/['"]/g,'').trim(); // M=연도
      const month = parseInt(val(13));        // N=월
      const inAmt = parseFloat(String(val(14)).replace(/[₩,W]/g,'')) || 0;  // O=수취
      const outAmt = parseFloat(String(val(15)).replace(/[₩,W]/g,'')) || 0; // P=지급
      if (!client || !product || isNaN(month)) continue;
      const gp = inAmt - outAmt;
      // 매칭 키: 고객사|브랜드|담당스쿼드|연도|월 (통합정산 C~G ↔ cashflow D,E,H,N,O)
      const normProd = normalizeProduct(product);
      const pKey = client+'|'+brand+'|'+squad+'|'+year+'|'+month;
      if (!productMap[pKey]) productMap[pKey] = {};
      if (!productMap[pKey][normProd]) productMap[pKey][normProd] = {gp:0, inAmt:0};
      productMap[pKey][normProd].gp += gp;
      productMap[pKey][normProd].inAmt += inAmt;
      rowCount++;
      // Campaign timeline extraction
      const campName = String(val(1)).trim();
      const dateVal2 = (idx) => { const v = val(idx); if (!v) return null; const s = String(v).trim(); if (!s || s === '—') return null; if (s.match(/^Date\(/)) { const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/); if(dm) return dm[1]+'-'+String(+dm[2]+1).padStart(2,'0')+'-'+String(+dm[3]).padStart(2,'0'); } return s.length >= 10 ? s.slice(0,10) : null; };
      const numVal2 = (idx) => { const v = val(idx); return v ? (parseInt(v) || 0) : 0; };
      if (campName) {
        const numColsCheck = numCols > 25;
        const ds = numColsCheck ? dateVal2(25) : null, de = numColsCheck ? dateVal2(26) : null, ss = numColsCheck ? dateVal2(27) : null;
        const rs = numColsCheck ? dateVal2(28) : null, re = numColsCheck ? dateVal2(29) : null, ce = numColsCheck ? dateVal2(30) : null;
        const are = numColsCheck ? dateVal2(34) : null;
        const ta = numColsCheck ? numVal2(31) : 0, ts = numColsCheck ? numVal2(32) : 0, tr = numColsCheck ? numVal2(33) : 0;
        const campStatus = String(val(11)).trim(); // L열=캠페인 마감 여부
        campList.push({campaign:campName, client, brand, product, squad, country, item, year, month, gp, inAmt, outAmt, discStart:ds, discEnd:de, shipStart:ss, recStart:rs, recEnd:re, contractEnd:ce, tgtAccept:ta, tgtShip:ts, tgtRec:tr, actualRecEnd:are, campStatus});
      }
    }
    // Array 형태로 변환 (GP 내림차순 정렬)
    const result = {};
    for (const [k, prods] of Object.entries(productMap)) {
      result[k] = Object.entries(prods)
        .map(([name, v]) => ({name, gp:v.gp, inAmt:v.inAmt}))
        .sort((a,b) => b.gp - a.gp);
    }
    // Store campaign data globally
    if (campList.length > 0) {
      CAMPAIGN_DATA = campList;
      dbg('✅ 캠페인 타임라인 '+campList.length+'건 로드 (cashflow 별도 파싱)');
    }
    dbg('Cashflow 파싱: '+rowCount+'행 → '+Object.keys(result).length+'개 상품 키');
    return Object.keys(result).length > 0 ? result : null;
  } catch(e) {
    dbg('❌ Cashflow parse error: '+e.message);
    return null;
  }
}
// ─── 상품 데이터 로드 (cashflow 시트 탐색) ──────────────────────────
async function loadProductData(sheetId) {
  dbg('📦 상품 데이터 로드 시작...');
  const manualGid = localStorage.getItem('tkcle_cashflow_gid');
  const defaultGids = [159763230, 0, 1, 2, 3, 4, 5].filter(g => g !== MAIN_GID);
  const gidList = manualGid ? [parseInt(manualGid)] : defaultGids;
  dbg('탐색 gid 목록: ['+gidList.join(',')+']'+(manualGid?' (수동설정)':''));
  let mainSig = null;
  if (RAW.length > 0) {
    mainSig = RAW.length + '|' + (RAW[0]||[]).join('|').substring(0, 100);
  }
  for (const gid of gidList) {
    let response = null;
    if (GAS_URL) {
      response = await fetchSheetGAS(GAS_URL, sheetId, gid, '_handleProd'+gid);
    }
    if (!response) {
      response = await fetchSheetJSONP(sheetId, gid, '_handleProd'+gid);
    }
    // Google Viz API fallback for product sheets
    if (!response && typeof google !== 'undefined' && google.visualization) {
      dbg('📡 상품 시트 Google Viz: gid='+gid);
      const vizData = await fetchViaGoogleViz(sheetId, gid);
      if (vizData && vizData._rawResponse) response = vizData._rawResponse;
    }
    if (!response || !response.table) {
      dbg('gid='+gid+': 응답 없음 (시트 없거나 권한 문제)');
      continue;
    }
    const rows = response.table.rows || [];
    const numCols = response.table.cols?.length || 0;
    // 메인 시트 중복 방지: 열 수가 다르면 다른 시트로 간주 (cashflow는 보통 30열 이상)
    const sig = numCols + ':' + rows.length + '|' + (rows[0]?.c||[]).map(c => c?.v||'').join('|').substring(0, 100);
    if (mainSig && sig === mainSig) {
      dbg('gid='+gid+': 메인 시트 중복 → skip');
      continue;
    }
    dbg('gid='+gid+': '+numCols+'열, '+rows.length+'행');
    if (numCols >= 15) {
      const prodMap = parseCashflowForProducts(response);
      if (prodMap) {
        PRODUCT_MAP = prodMap;
        localStorage.setItem('tkcle_cashflow_gid', String(gid));
        dbg('✅ gid='+gid+'에서 상품 '+Object.keys(prodMap).length+'개 키 매칭 완료!');
        return true;
      } else { dbg('gid='+gid+': cashflow 형식이나 매칭 결과 없음'); }
    } else { dbg('gid='+gid+': '+numCols+'열 < 15 → cashflow 아님'); }
  }
  dbg('❌ cashflow 시트 미발견 (gid '+gidList.join(',')+' 탐색 완료)');
  return false;
}
// ─── Main Data Load ──────────────────────────────────────────────
async function loadData(showStatus) {
  _debugLog.length = 0; // 로그 초기화
  const sheetId = extractSheetId(SHEETS_ID);
  dbg('🚀 loadData 시작 | sheetId="'+sheetId+'" | 메인 gid='+MAIN_GID);
  dbg('   프로토콜: '+location.protocol+' | GAS: '+(GAS_URL ? '설정됨' : '미설정'));
  if (location.protocol === 'file:') dbg('⚠️ file:// 환경 → CSV fetch 불가, JSONP/GoogleViz 사용');
  function applyData(sheetsData, source) {
    RAW.length = 0;
    const rows = sheetsData.rows || sheetsData;
    rows.forEach(r => RAW.push(r));
    dbg('✅ '+source+' → '+rows.length+'행 로드 성공');
    if (sheetsData.productMap && Object.keys(sheetsData.productMap).length > 0) {
      PRODUCT_MAP = sheetsData.productMap;
      dbg('✅ 메인 시트에서 상품 데이터 포함 ('+Object.keys(PRODUCT_MAP).length+'개 키)');
    }
    if (sheetsData.campaignData && sheetsData.campaignData.length > 0) {
      CAMPAIGN_DATA = sheetsData.campaignData;
      dbg('✅ 캠페인 타임라인 데이터 '+CAMPAIGN_DATA.length+'건 로드');
    }
    dataSource = 'sheets';
    lastUpdateTime = new Date();
    rebuildGlobals();
    render();
  }
  if (sheetId) {
    isLoading = true;
    if (showStatus) updateStatusUI();
    let mainLoaded = false;
    // 1-A) GAS 프록시
    if (GAS_URL) {
      dbg('── 1-A) GAS 프록시로 메인(gid='+MAIN_GID+') 시도');
      const gasData = await fetchViaGAS(GAS_URL, sheetId, MAIN_GID);
      if (gasData) {
        isLoading = false;
        applyData(gasData, 'GAS proxy');
        mainLoaded = true;
      } else { dbg('❌ GAS 메인 로드 실패'); }
    }
    // 1-B) JSONP (Google Visualization API)
    if (!mainLoaded) {
      dbg('── 1-B) JSONP(gviz)로 메인(gid='+MAIN_GID+') 시도');
      const sheetsData = await fetchViaJSONP(sheetId, MAIN_GID);
      if (sheetsData) {
        isLoading = false;
        applyData(sheetsData, 'JSONP');
        mainLoaded = true;
      } else { dbg('❌ JSONP 메인 로드 실패'); }
    }
    // 1-C) Google Visualization API (공식 라이브러리)
    if (!mainLoaded) {
      dbg('── 1-C) Google Visualization API로 메인(gid='+MAIN_GID+') 시도');
      const vizData = await fetchViaGoogleViz(sheetId, MAIN_GID);
      if (vizData) {
        isLoading = false;
        applyData(vizData, 'Google Viz API');
        mainLoaded = true;
      } else { dbg('❌ Google Viz 메인 로드 실패'); }
    }
    // 1-D) CSV
    if (!mainLoaded) {
      dbg('── 1-D) CSV로 메인(gid='+MAIN_GID+') 시도');
      const csvData = await fetchViaCSV(sheetId, MAIN_GID);
      isLoading = false;
      if (csvData && csvData.length > 0) {
        RAW.length = 0; csvData.forEach(r => RAW.push(r));
        dataSource = 'sheets'; lastUpdateTime = new Date();
        dbg('✅ CSV → '+csvData.length+'행 로드 성공');
        rebuildGlobals(); render(); mainLoaded = true;
      } else { dbg('❌ CSV 메인 로드 실패'); }
    }
    // 2+3) 상품 데이터 + 매출정산 병렬 로드
    if (mainLoaded) {
      const jobs = [];

      // 강제 새로고침(showStatus) 또는 최초 로딩 시 항상 cashflow 시트 재로드
      if (showStatus || Object.keys(PRODUCT_MAP).length === 0) {
        dbg('── 2) cashflow 시트 로드 (캠페인 타임라인 갱신)');
        CAMPAIGN_DATA = []; // 캐시 초기화
        jobs.push(
          loadProductData(sheetId).then(found => { if (found) render(); })
        );
      }

      dbg('── 3) 매출정산 시트(gid='+TAX_GID+') 병렬 로드');
      const taxUrl = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+TAX_GID+'&_='+Date.now();
      jobs.push(
        loadJSONP(taxUrl, 15000).then(rawTaxResp => {
          if (rawTaxResp && rawTaxResp.table) {
            const taxData = parseSettlementResponse(rawTaxResp);
            if (taxData && taxData.length > 0) {
              TAX_DATA = taxData;
              dbg('✅ 세금계산서 데이터 '+TAX_DATA.length+'건 로드');
              render();
            } else { dbg('⚠️ 매출정산 파싱 결과 없음'); }
          } else { dbg('⚠️ 매출정산 JSONP 실패 → 스킵'); }
        })
      );

      dbg('── 4) 인플 지급 시트(gid='+INFLU_PAY_GID+') 병렬 로드');
      const influUrl = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+INFLU_PAY_GID+'&_='+Date.now();
      jobs.push(
        loadJSONP(influUrl, 15000).then(rawInfluResp => {
          if (rawInfluResp && rawInfluResp.table) {
            const influData = parseInfluPayResponse(rawInfluResp);
            if (influData && influData.length > 0) {
              INFLU_PAY_DATA = influData;

        })
      );

      await Promise.all(jobs);
    }
    if (!mainLoaded) {
      dbg('⚠️ 모든 방법 실패 → fallback 데이터 사용');
      if (location.protocol === 'file:') {
        dbg('');
        dbg('💡 [해결방법] file:// 프로토콜에서는 외부 데이터 로드가 차단됩니다.');
        dbg('   아래 중 하나를 시도해 주세요:');
        dbg('   1) 터미널/CMD에서: python -m http.server 8080');
        dbg('      → http://localhost:8080/tkcle_dashboard_v2.html 접속');
        dbg('   2) VS Code의 "Live Server" 확장 프로그램 사용');
        dbg('   3) 설정 패널의 "데이터 붙여넣기" 기능 사용');
      } else {
        dbg('🔗 진단: 아래 URL을 브라우저 새 탭에서 열어보세요:');
        dbg('   https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID);
        dbg('   → 데이터가 보이면 시트 공개 OK, 안 보이면 공개 설정 확인');
      }
    }
    if (mainLoaded) return;
  } else { dbg('⚠️ sheetId가 비어있음 → fallback'); }
  // Fallback
  RAW.length = 0; FALLBACK_RAW.forEach(r => RAW.push(r));
  dataSource = sheetId ? 'error' : 'fallback';
  lastUpdateTime = new Date();
  rebuildGlobals(); render();
}

// ─── GAS POST: 캠페인 상태(L열) 업데이트 ──────────────────────────
async function gasUpdateStatus(campaign, client, status) {
  if (!GAS_URL) {
    alert('GAS URL이 설정되지 않았습니다.\n설정 패널에서 GAS 프록시 URL을 입력해주세요.');
    return false;
  }
  const secret = localStorage.getItem('tkcle_gas_secret') || '';
  if (!secret) {
    alert('공유 비밀키가 설정되지 않았습니다.\n설정 패널에서 비밀키를 입력해주세요.');
    return false;
  }
  return new Promise((resolve) => {
    const cbName = '_gasWrite_' + Date.now();
    const timeoutId = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      alert('GAS 응답 시간 초과. GAS URL을 확인해주세요.');
      resolve(false);
    }, 10000);

    window[cbName] = (result) => {
      clearTimeout(timeoutId);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      if (result.success) {
        dbg('✅ 상태 업데이트: '+campaign+' / '+client+' → '+status+' ('+result.updated+'행)');
        resolve(true);
      } else {
        alert('업데이트 실패: ' + (result.error || '알 수 없는 오류'));
        resolve(false);
      }
    };

    const sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    const url = GAS_URL + sep +
      'callback=' + cbName +
      '&action=updateStatus' +
      '&secret=' + encodeURIComponent(secret) +
      '&campaign=' + encodeURIComponent(campaign) +
      '&client=' + encodeURIComponent(client) +
      '&status=' + encodeURIComponent(status);

    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timeoutId);
      delete window[cbName];
      script.remove();
      dbg('❌ gasUpdateStatus onerror: ' + url.substring(0, 120));
      alert('GAS 요청 오류.\n\n가능한 원인:\n• GAS가 재배포 필요\n• 네트워크 일시 오류\n\n잠시 후 다시 시도해주세요.');
      resolve(false);
    };
    document.body.appendChild(script); // head 대신 body: 일부 브라우저 head onerror 방지
  });
}

// ─── 상태 배지 클릭 → 드롭다운 수정 ──────────────────────────────
// brand/year/month/product/country/item 은 타임라인 미등록 테이블에서만 전달 (노TL 전용 + 버튼용)
async function openStatusEdit(uid, campaign, client, current, brand, year, month, product, country, item) {
  const el = document.getElementById(uid);
  if (!el) return;
  const opts = ['운영 전','운영 중','마감','홀딩'];
  const smap = {
    '운영 전': {bg:'#422006',color:'#fbbf24',label:'운영 전'},
    '운영 중': {bg:'#14532d',color:'#4ade80',label:'운영 중'},
    '마감':    {bg:'#1e293b',color:'#94a3b8',label:'마감'},
    '홀딩':    {bg:'#3b1c1c',color:'#f87171',label:'홀딩'},
  };
  const v = String(current||'').trim()
    .replace(/^운영\s*중[\s\S]*$/, '운영 중')
    .replace(/^운영\s*전[\s\S]*$/, '운영 전')
    .replace(/^마감[\s\S]*$/, '마감')
    .replace(/^홀딩[\s\S]*$/, '홀딩');
  const origHTML = el.outerHTML;
  const esc2 = s => String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const hasExtra = !!(brand && year && month); // noTL 전용 추가 데이터 여부

  // ── 드롭다운 + (+ 버튼) 래퍼 컨테이너 ──
  const container = document.createElement('span');
  container.style.cssText = 'display:inline-flex;align-items:center;gap:4px';

  const sel = document.createElement('select');
  sel.style.cssText = 'font-size:10px;background:#1e293b;color:#e2e8f0;border:1px solid #4ade80;border-radius:8px;padding:2px 6px;cursor:pointer;outline:none;';
  opts.forEach(o => {
    const opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === v) opt.selected = true;
    sel.appendChild(opt);
  });
  container.appendChild(sel);

  // ── "+" 버튼 (noTL 전용: 운영 중 선택 시 활성화) ──
  let plusBtn = null;
  let skipBlur = false;
  if (hasExtra) {
    plusBtn = document.createElement('button');
    plusBtn.textContent = '+';
    plusBtn.title = '타임라인 · 제품명 · 마감여부 입력';
    plusBtn.style.cssText = 'padding:2px 8px;background:#818cf8;border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;display:' + (v === '운영 중' ? 'inline-block' : 'none');
    container.appendChild(plusBtn);

    // 드롭다운 변경 시 + 버튼 표시/숨김
    sel.addEventListener('change', () => {
      if (plusBtn) plusBtn.style.display = sel.value === '운영 중' ? 'inline-block' : 'none';
    });

    // + 버튼 클릭 시: blur 억제 → 상태 저장 → 타임라인 모달 열기
    plusBtn.addEventListener('mousedown', () => { skipBlur = true; });
    plusBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      skipBlur = false;
      const newVal = sel.value;
      // 상태가 바뀌었으면 먼저 저장
      if (newVal !== v) {
        sel.disabled = true; sel.style.opacity = '0.5';
        const ok = await gasUpdateStatus(campaign, client, newVal);
        if (ok) {
          CAMPAIGN_DATA.forEach(d => {
            if (String(d.campaign) === campaign && String(d.client) === client) d.campStatus = newVal;
          });
        }
        sel.disabled = false; sel.style.opacity = '1';
      }
      // 컨테이너를 원래 배지 형태로 교체 (+ 버튼은 없음 — 모달에서 처리)
      const m = smap[newVal] || {bg:'#1e293b',color:'#94a3b8',label:newVal};
      const extraArgs = ',\''+esc2(brand)+'\',\''+esc2(String(year))+'\',\''+esc2(String(month))+'\',\''+esc2(product||'')+'\',\''+esc2(country||'')+'\',\''+esc2(item||'')+'\'';
      const newHTML = '<span id="'+uid+'" style="display:inline-block;padding:2px 7px;border-radius:10px;background:'+m.bg+';color:'+m.color+';font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid transparent" onmouseenter="this.style.borderColor=\''+m.color+'44\'" onmouseleave="this.style.borderColor=\'transparent\'" onclick="openStatusEdit(\''+uid+'\',\''+esc2(campaign)+'\',\''+esc2(client)+'\',\''+esc2(newVal)+'\''+extraArgs+')" title="클릭하여 수정">'+m.label+'</span>';
      const tmp = document.createElement('span');
      tmp.innerHTML = newHTML;
      if (container.parentNode) container.replaceWith(tmp.firstChild);
      // 타임라인 모달 열기 (날짜는 모두 빈 값, campStatus는 현재 선택값)
      openTimelineEdit(client, brand, year, month, product||'', country||'', item||'', '', '', '', '', '', '', newVal);
    });
  }

  el.replaceWith(container);
  container.id = uid;
  el.removeAttribute('id');
  setTimeout(() => sel.focus(), 10);

  let changeHandled = false;
  const revert = () => {
    if (!container.parentNode) return;
    const tmp = document.createElement('span');
    tmp.innerHTML = origHTML;
    container.replaceWith(tmp.firstChild);
  };

  sel.addEventListener('change', async () => {
    if (changeHandled) return;
    changeHandled = true;
    const newVal = sel.value;
    sel.disabled = true;
    sel.style.opacity = '0.5';
    const ok = await gasUpdateStatus(campaign, client, newVal);
    if (ok) {
      CAMPAIGN_DATA.forEach(d => {
        if (String(d.campaign) === campaign && String(d.client) === client) d.campStatus = newVal;
      });
      const m = smap[newVal] || {bg:'#1e293b',color:'#94a3b8',label:newVal};
      const extraArgs = hasExtra ? ',\''+esc2(brand)+'\',\''+esc2(String(year))+'\',\''+esc2(String(month))+'\',\''+esc2(product||'')+'\',\''+esc2(country||'')+'\',\''+esc2(item||'')+'\'' : '';
      const newHTML = '<span id="'+uid+'" style="display:inline-block;padding:2px 7px;border-radius:10px;background:'+m.bg+';color:'+m.color+';font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid transparent" onmouseenter="this.style.borderColor=\''+m.color+'44\'" onmouseleave="this.style.borderColor=\'transparent\'" onclick="openStatusEdit(\''+uid+'\',\''+esc2(campaign)+'\',\''+esc2(client)+'\',\''+esc2(newVal)+'\''+extraArgs+')" title="클릭하여 수정">'+m.label+'</span>';
      const tmp = document.createElement('span');
      tmp.innerHTML = newHTML;
      if (container.parentNode) container.replaceWith(tmp.firstChild);
      showToast('✅ 상태 업데이트 완료');
    } else {
      changeHandled = false;
      sel.disabled = false;
      sel.style.opacity = '1';
      sel.value = v;
    }
  });
  sel.addEventListener('blur', () => {
    if (skipBlur) return;
    if (!changeHandled) setTimeout(revert, 150);
  });
  sel.addEventListener('keydown', e => {
    if (e.key === 'Escape') { changeHandled = true; revert(); }
  });
}

// ─── GAS: 타임라인 날짜 업데이트 ────────────────────────────────
async function gasUpdateTimeline(client, brand, year, month, country, item, dates, newItem, newCampStatus) {
  if (!GAS_URL) { alert('GAS URL이 설정되지 않았습니다.'); return false; }
  const secret = localStorage.getItem('tkcle_gas_secret') || '';
  if (!secret) { alert('공유 비밀키가 설정되지 않았습니다.'); return false; }
  return new Promise((resolve) => {
    const cbName = '_gasTL_' + Date.now();
    const timeoutId = setTimeout(() => {
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      alert('GAS 응답 시간 초과.');
      resolve(null);
    }, 10000);
    window[cbName] = (result) => {
      clearTimeout(timeoutId);
      delete window[cbName];
      const s = document.getElementById(cbName);
      if (s) s.remove();
      if (result.success) { resolve(result); }
      else { alert('타임라인 업데이트 실패: ' + (result.error || '알 수 없는 오류')); resolve(null); }
    };
    const sep = GAS_URL.indexOf('?') >= 0 ? '&' : '?';
    const url = GAS_URL + sep +
      'callback=' + cbName +
      '&action=updateTimeline' +
      '&secret=' + encodeURIComponent(secret) +
      '&client=' + encodeURIComponent(client) +
      '&brand=' + encodeURIComponent(brand) +
      '&year=' + encodeURIComponent(year) +
      '&month=' + encodeURIComponent(month) +
      '&country=' + encodeURIComponent(country||'') +
      '&item=' + encodeURIComponent(item||'') +
      '&discStart=' + encodeURIComponent(dates.discStart||'') +
      '&discEnd=' + encodeURIComponent(dates.discEnd||'') +
      '&shipStart=' + encodeURIComponent(dates.shipStart||'') +
      '&recStart=' + encodeURIComponent(dates.recStart||'') +
      '&recEnd=' + encodeURIComponent(dates.recEnd||'') +
      '&contractEnd=' + encodeURIComponent(dates.contractEnd||'') +
      (newItem    !== undefined ? '&newItem='        + encodeURIComponent(newItem||'')       : '') +
      (newCampStatus !== undefined ? '&newCampStatus=' + encodeURIComponent(newCampStatus||'') : '');
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url;
    script.onerror = () => {
      clearTimeout(timeoutId); delete window[cbName]; script.remove();
      alert('GAS 요청 오류.');
      resolve(null);
    };
    document.head.appendChild(script);
  });
}

// ─── Gantt 타임라인 수정 모달 열기 ──────────────────────────────

  document.getElementById('tlm_product').textContent = product + (subLabel ? '  [' + subLabel + ']' : '');
  document.getElementById('tlm_discStart').value = discStart || '';
  document.getElementById('tlm_discEnd').value = discEnd || '';
  document.getElementById('tlm_shipStart').value = shipStart || '';
  document.getElementById('tlm_recStart').value = recStart || '';
  document.getElementById('tlm_recEnd').value = recEnd || '';
  document.getElementById('tlm_contractEnd').value = contractEnd || '';
  // 제품명 (I열) - 현재 값으로 pre-fill
  document.getElementById('tlm_itemInput').value = item || '';
  // 캠페인 마감 여부 (L열) - 정규화 후 pre-fill
  const normStatus = String(campStatus||'').trim()
    .replace(/^운영\s*중[\s\S]*$/, '운영 중')
    .replace(/^운영\s*전[\s\S]*$/, '운영 전')
    .replace(/^마감[\s\S]*$/, '마감')
    .replace(/^홀딩[\s\S]*$/, '홀딩');
  document.getElementById('tlm_campStatus').value = normStatus;
  // Store context
  modal.dataset.client = client;
  modal.dataset.brand = brand;
  modal.dataset.year = year;
  modal.dataset.month = month;
  modal.dataset.product = product || '';
  modal.dataset.country = country || '';
  modal.dataset.item = item || '';
  modal.dataset.campStatus = normStatus;
  modal.style.display = 'flex';
}
function closeTimelineModal() {
  const modal = document.getElementById('timelineEditModal');
  if (modal) modal.style.display = 'none';
}
function patchCampaignData(client, brand, year, month, product, dates, newItem, newCampStatus) {
  const mo = parseInt(month), yr = String(year);
  CAMPAIGN_DATA.forEach(d => {
    if (String(d.client) === client && String(d.brand) === brand &&
        String(d.year) === yr && parseInt(d.month) === mo &&
        (!product || String(d.product) === product)) {
      if (dates.discStart   !== undefined) d.discStart   = dates.discStart   || null;
      if (dates.discEnd     !== undefined) d.discEnd     = dates.discEnd     || null;
      if (dates.shipStart   !== undefined) d.shipStart   = dates.shipStart   || null;
      if (dates.recStart    !== undefined) d.recStart    = dates.recStart    || null;
      if (dates.recEnd      !== undefined) d.recEnd      = dates.recEnd      || null;
      if (dates.contractEnd !== undefined) d.contractEnd = dates.contractEnd || null;
      if (newItem     !== undefined && newItem !== null) d.item       = newItem;
      if (newCampStatus !== undefined && newCampStatus !== null) d.campStatus = newCampStatus;
    }
  });
}
function showToast(msg) {
  let t = document.getElementById('_toast');
  if (!t) {
    t = document.createElement('div');

    t.style.cssText = 'position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';

async function saveTimelineEdit() {
  const modal = document.getElementById('timelineEditModal');
  if (!modal) return;
  const client = modal.dataset.client;
  const brand = modal.dataset.brand;
  const year = modal.dataset.year;
  const month = modal.dataset.month;
  const country = modal.dataset.country || '';
  const item = modal.dataset.item || '';
  const dates = {
    discStart: document.getElementById('tlm_discStart').value,
    discEnd: document.getElementById('tlm_discEnd').value,
    shipStart: document.getElementById('tlm_shipStart').value,
    recStart: document.getElementById('tlm_recStart').value,
    recEnd: document.getElementById('tlm_recEnd').value,
    contractEnd: document.getElementById('tlm_contractEnd').value,
  };
  // 새로 추가된 필드
  const newItem       = document.getElementById('tlm_itemInput').value.trim();
  const newCampStatus = document.getElementById('tlm_campStatus').value;
  const btn = document.getElementById('tlm_saveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
  const result = await gasUpdateTimeline(client, brand, year, month, country, item, dates, newItem, newCampStatus);
  if (btn) { btn.disabled = false; btn.textContent = '저장'; }
  // GAS 응답 없음(timeout)이어도 시트엔 저장됐을 수 있으므로 로컬 반영 여부 묻기
  if (!result) {
    const applyLocal = confirm('⏱ GAS 응답 시간 초과\n시트에는 저장됐을 수 있습니다.\n대시보드에 입력한 날짜를 바로 반영할까요?');
    if (applyLocal) {
      closeTimelineModal();
      patchCampaignData(client, brand, year, month, modal.dataset.product||'', dates, newItem, newCampStatus);
      render();
      showToast('⚠️ 대시보드 반영 완료 (시트 확인 권장)');
    }
    return;
  }
  if (result && result.success) {

function renderWaterfall(canvas, waterfall) {
  if(wfChart) wfChart.destroy();
  const wfFuture = waterfall.map(w => isFutureMonth(w.ym));
  const wfOpacity = (base, isFut) => {
    if (!isFut) return base;
    if (base.startsWith('#')) {
      const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+',0.3)';
    }
    return base.replace(/[\d.]+\)$/,'0.3)');
  };
  const wfGPArr = waterfall.map(w => w.gp);
  // 억 단위 포맷: ▲X.XX억
  const fmtEok = (v) => (Math.abs(v) / 1e8).toFixed(2) + '억';
  const wfMomLabels = wfGPArr.map((gp, i) => {
    if (i === 0) return null;
    const diff = gp - wfGPArr[i-1];
    if (diff === 0) return null;
    return { diff, label: (diff >= 0 ? '▲' : '▼') + fmtEok(diff) };
  });
  wfChart = new Chart(canvas, { type:'bar', data: { labels: waterfall.map(w=>w.ym), datasets: [
    { label:'신규 유입', data:waterfall.map(w=>w.newGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#10b981',wfFuture[i])), borderRadius:3 },
    { label:'복귀', data:waterfall.map(w=>w.reGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#38bdf8',wfFuture[i])), borderRadius:3 },
    { label:'기존 고객 변동', data:waterfall.map(w=>w.contChg), backgroundColor:waterfall.map((w,i)=>wfOpacity(w.contChg>=0?'#f59e0b':'#fb923c',wfFuture[i])), borderRadius:3 },
    { label:'종료·이탈', data:waterfall.map(w=>w.endGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#ef4444',wfFuture[i])), borderRadius:3 }
  ]}, options: { responsive:true, maintainAspectRatio:false,
    interaction: { mode:'index', intersect:false },
    plugins:{
      legend:{position:'bottom', labels:{color:'#94a3b8', font:{size:11}, boxWidth:12, padding:12}},
      tooltip:{
        callbacks:{
          title: items => items[0]?.label + (isFutureMonth(items[0]?.label) ? ' (예정)' : ''),
          label: () => null,
          afterBody: items => {
            const idx = items[0]?.dataIndex;
            if (idx === undefined) return [];
            const w = waterfall[idx];
            const fut = isFutureMonth(w.ym) ? ' (예정)' : '';
            // 부호를 항상 앞에, 원화기호도 앞에: +₩XXX / -₩XXX
            const signFmt = v => (v >= 0 ? '+' : '-') + '₩' + Math.round(Math.abs(v)).toLocaleString();
            const prevGP = idx > 0 ? wfGPArr[idx - 1] : null;
            const diff = prevGP !== null ? w.gp - prevGP : null;
            const diffPct = (diff !== null && prevGP !== 0) ? (diff / Math.abs(prevGP) * 100).toFixed(1) : null;
            const lines = [
              '  신규 유입:    ' + signFmt(w.newGP),
              '  복귀:        ' + signFmt(w.reGP),
              '  기존 고객:   ' + signFmt(w.contChg),
              '  종료·이탈:  ' + signFmt(w.endGP),
              '─────────────────',
            ];
            if (diff !== null) {
              lines.push('  전월 대비:  ' + signFmt(diff) + (diffPct !== null ? '  (' + (diff >= 0 ? '+' : '') + diffPct + '%)' : '') + fut);
            } else {
              lines.push('  첫 달 기준' + fut);
            }
            return lines;
          }
        }
      }
    },
    scales:{
      x:{stacked:true, ticks:{color:waterfall.map(w=>isFutureMonth(w.ym)?'rgba(148,163,184,0.4)':'#94a3b8')}},
      y:{stacked:true, ticks:{callback:v=>fmt(v)}, grid:{color:'rgba(100,116,139,0.15)'}}
    },
    layout: { padding: { top: 28 } }
  },
  plugins: [{
    id: 'wfLabels',
    // afterDatasetsDraw: 툴팁보다 먼저 그려져서 마우스오버 시 툴팁이 레이블 위에 표시됨
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      ctx.save();
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      wfMomLabels.forEach((item, i) => {
        if (!item) return;
        let topY = Infinity, barX = null;
        [0,1,2,3].forEach(dsIdx => {
          const m = chart.getDatasetMeta(dsIdx);
          if (m && m.data[i]) {
            if (m.data[i].y < topY) topY = m.data[i].y;

          }
        });
        if (topY === Infinity || barX === null) return;
        ctx.fillStyle = item.diff >= 0 ? '#4ade80' : '#f87171';
        ctx.fillText(item.label, barX, topY - 4);
      });
      ctx.restore();
    }
  }]
  });
}

function heatColor(val, maxVal) {
  if(val===0) return 'transparent';
  if(val<0) return 'rgba(239,68,68,'+(0.4+Math.min(Math.abs(val)/maxVal,1)*0.6).toFixed(2)+')';
  const logVal = Math.log10(val+1);
  const logMax = Math.log10(maxVal+1);
  const ratio = logMax>0 ? logVal/logMax : 0;
  const intensity = 0.12 + ratio * 0.88;
  const r = Math.round(79 - ratio*30);
  const g = Math.round(70 - ratio*20);
  const b = Math.round(229 + ratio*20);
  return 'rgba('+r+','+g+','+Math.min(b,255)+','+intensity.toFixed(2)+')';
}

      '<span style="color:#64748b">원인 가능성:</span><br>' +
      '• 시트가 공개되지 않음 → Google Sheets → 공유 → "링크가 있는 모든 사용자" 설정<br>' +
      '• 시트 ID 오류 → 현재 ID: <code>'+sheetId+'</code><br>' +
      '• 직접 확인: <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">이 링크를 새 탭에서 열어보세요</a>';
  }, 15000);
  window[cbName] = function(resp) {
    if (done) return; done = true; clearTimeout(timer); delete window[cbName];
    if (resp && resp.status === 'ok' && resp.table) {
      const rowCount = resp.table.rows ? resp.table.rows.length : 0;
      const colCount = resp.table.cols ? resp.table.cols.length : 0;
      resultEl.innerHTML = '✅ <b>시트 접근 성공!</b><br>' +
        '행: '+rowCount+' | 열: '+colCount+'<br>' +
        '<span style="color:#64748b">JSONP 정상 작동 → "다시 연결" 버튼을 눌러주세요</span>';
    } else if (resp && resp.status === 'error') {
      const err = resp.errors?.[0]?.detailed_message || resp.errors?.[0]?.message || 'unknown';
      resultEl.innerHTML = '❌ <b>Google API 에러:</b> '+err+'<br>' +
        '• 시트 공개 설정을 확인해주세요<br>' +
        '• <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">브라우저에서 직접 확인</a>';
    } else {
      resultEl.innerHTML = '⚠️ 응답은 받았으나 예상과 다른 형식입니다.';
    }
  };
  // google.visualization.Query.setResponse 라우팅
  _pendingJsonpCb = cbName;
  const s = document.createElement('script');
  s.src = testUrl + '&tqx=responseHandler:'+cbName;
  s.onerror = () => {
    if (done) return; done = true; clearTimeout(timer); delete window[cbName];
    resultEl.innerHTML = '❌ <b>스크립트 로드 실패</b><br>' +
      '• 네트워크 연결 확인<br>' +
      '• 시트 ID 확인: <code>'+sheetId+'</code><br>' +
      '• <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">직접 확인 링크</a>';
  };
  document.body.appendChild(s);
}
function togglePasteUI() {
  const el = document.getElementById('pastePanel');
  if(el) el.style.display = el.style.display==='none'?'block':'none';
}
// ─── 로컬 파일에서 gviz JSON 로드 (file:// 환경용) ────────────────
function loadFromFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('fileLoadStatus');
  if (statusEl) statusEl.textContent = '📂 '+file.name+' 읽는 중...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      // google.visualization.Query.setResponse(...) 래퍼 제거
      text = text.replace(/^\/\*O_o\*\/\s*/, '');
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
      if (match) text = match[1];
      // 또는 순수 JSON일 수 있음
      const data = JSON.parse(text);
      if (!data.table || !data.table.rows) {
        if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ 유효하지 않은 gviz 형식</span>';
        return;
      }
      dbg('📂 파일 로드: '+file.name+' ('+data.table.rows.length+'행, '+data.table.cols.length+'열)');
      if (type === 'main') {
        const parsed = parseGvizResponse(data, 'main');
        if (parsed && parsed.rows && parsed.rows.length > 0) {
          RAW.length = 0;
          parsed.rows.forEach(r => RAW.push(r));
          dataSource = 'sheets';
          lastUpdateTime = new Date();
          rebuildGlobals();
          render();
          dbg('✅ 메인 파일 로드 완료: '+parsed.rows.length+'행');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">✅ 메인 데이터 '+parsed.rows.length+'행 로드 완료!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ 파싱 실패 — 시트 형식 확인</span>';
        }
      } else if (type === 'cashflow') {
        const prodMap = parseCashflowForProducts(data);
        if (prodMap && Object.keys(prodMap).length > 0) {
          PRODUCT_MAP = prodMap;
          render();
          dbg('✅ Cashflow 파일 로드 완료: '+Object.keys(prodMap).length+'개 상품 키');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">✅ 상품 데이터 '+Object.keys(prodMap).length+'개 키 로드!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ cashflow 파싱 실패</span>';
        }
      }
      updateDebugPanel();
    } catch(err) {
      dbg('❌ 파일 파싱 에러: '+err.message);
      if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ JSON 파싱 에러: '+err.message+'</span>';
      updateDebugPanel();
    }
  };
  reader.readAsText(file);
}
function updateJsonLinks() {
  const sheetId = extractSheetId(SHEETS_ID);
  if (!sheetId) return;
  const mainLink = document.getElementById('mainJsonLink');
  const cfLink = document.getElementById('cfJsonLink');
  if (mainLink) mainLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID;
  // cashflow gid: localStorage에 저장된 값 또는 기본값
  const cfGid = localStorage.getItem('tkcle_cashflow_gid') || '0';
  if (cfLink) cfLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+cfGid;
}
// Only auto-load if already authenticated (session persists on refresh)
if (sessionStorage.getItem('tkcle_auth') === '1') {
  loadData(true).then(()=>{updateDebugPanel();updateJsonLinks();});
}
</script>
