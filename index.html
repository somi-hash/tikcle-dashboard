<body>
<!-- Password Lock Screen -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>TikCle Dashboard</h2>
    <p>접근하려면 비밀번호를 입력하세요</p>
    <input type="password" id="pwInput" placeholder="비밀번호" autocomplete="off"
      onkeydown="if(event.key==='Enter')unlockDashboard()">
    <button onclick="unlockDashboard()">확인</button>
    <div class="error-msg" id="pwError"></div>
  </div>
</div>
<div id="app" style="display:none">
  <div style="text-align:center;padding:60px;color:#64748b;font-size:16px;">데이터를 로드하는 중...</div>
</div>
<script>
// ─── Password Protection ───
const _PW_HASH = '1f7192c8';
function simpleHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; }
  return (h >>> 0).toString(16).slice(0, 8);
}
function unlockDashboard() {
  const input = document.getElementById('pwInput').value;
  if (simpleHash(input) === _PW_HASH) {
    sessionStorage.setItem('tkcle_auth', '1');
    document.getElementById('lockScreen').classList.add('fade-out');
    document.getElementById('app').style.display = '';
    setTimeout(() => { document.getElementById('lockScreen').remove(); }, 500);
    if (typeof loadData === 'function') loadData(true).then(()=>{if(typeof updateDebugPanel==='function')updateDebugPanel();if(typeof updateJsonLinks==='function')updateJsonLinks();});
  } else {
    document.getElementById('pwInput').classList.add('shake');
    document.getElementById('pwError').textContent = '비밀번호가 올바르지 않습니다';
    setTimeout(() => { document.getElementById('pwInput').classList.remove('shake'); }, 400);
  }
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('tkcle_auth') === '1') {
  document.getElementById('lockScreen').remove();
  document.getElementById('app').style.display = '';
}
</script>
<script>
// ─── GOOGLE SHEETS CONFIG ────────────────────────────────────────
const DEFAULT_SHEETS_ID = '1sCiHuEBA-Qr-Ekg4DyWv-hLy1p9CvMiso5ZnPg5j52Q';
const DEFAULT_MAIN_GID = 93829805; // 통합정산 시트 gid
// 구 시트 ID가 localStorage에 남아있으면 자동 초기화
const _OLD_SHEETS_ID = '1MbxoehGgkveDwle7gFWfPlCl1XlHVmzqEw8HtOOkIm8';
const _OLD_MAIN_GIDS = [1397695984, 474078757];
if (localStorage.getItem('tkcle_sheets_id') === _OLD_SHEETS_ID) {
  localStorage.removeItem('tkcle_sheets_id');
  localStorage.removeItem('tkcle_main_gid');
  localStorage.removeItem('tkcle_cashflow_gid');
}
_OLD_MAIN_GIDS.forEach(g => {
  if (parseInt(localStorage.getItem('tkcle_main_gid')) === g) localStorage.removeItem('tkcle_main_gid');
});
let SHEETS_ID = localStorage.getItem('tkcle_sheets_id') || DEFAULT_SHEETS_ID;
let MAIN_GID = parseInt(localStorage.getItem('tkcle_main_gid')) || DEFAULT_MAIN_GID;
let GAS_URL = localStorage.getItem('tkcle_gas_url') || '';
let dataSource = 'fallback';
let lastUpdateTime = null;
let isLoading = false;
let PRODUCT_MAP = {};
let CAMPAIGN_DATA = []; // [{campaign, client, brand, product, squad, year, month, discStart, discEnd, shipStart, recStart, recEnd, contractEnd, tgtAccept, tgtShip, tgtRec, actualRecEnd}]
const TAX_GID = 982424415; // 매출정산 시트 gid
const DEFAULT_CASHFLOW_GID = 159763230; // cashflow 시트 gid
// cashflow GID가 미설정이거나 구 시트 GID면 기본값으로 초기화
if (!localStorage.getItem('tkcle_cashflow_gid')) {
  localStorage.setItem('tkcle_cashflow_gid', String(DEFAULT_CASHFLOW_GID));
}
let TAX_DATA = []; // [{ym, campaign, client, brand, squad, year, month, settleType, taxAmtEx, taxAmtIn, issueDate, invoiceInfo, payDueDate, paid}]
const INFLU_PAY_GID = 1385383205; // 인플루언서 지급 시트 gid
const FX_USD_TO_KRW = 1500;       // USD→KRW 환산용 고정 환율
let INFLU_PAY_DATA = []; // [{date, ym, amt, client, brand, csm, year, month, usdOriginal, krwOriginal}]
let expandedCashflowYm = null; // 현금흐름 탭에서 펼쳐진 월 (yyyy-mm)
const CASHFLOW_START_YM = '2026-01'; // 현금흐름 탭 시작 월
// ─── Google gviz 기본 응답 핸들러 (JSONP 에러 캐치용) ────────────
// Google의 gviz API는 에러 발생 시 tqx=responseHandler를 무시하고
// google.visualization.Query.setResponse()를 호출함 → 이를 캐치
let _pendingJsonpCb = null;
window.google = window.google || {};
window.google.visualization = window.google.visualization || {};
window.google.visualization.Query = window.google.visualization.Query || {};
window.google.visualization.Query.setResponse = function(response) {
  if (typeof dbg === 'function') dbg('📥 google.visualization.Query.setResponse 호출됨 (status='+(response&&response.status||'?')+')');
  if (_pendingJsonpCb && typeof window[_pendingJsonpCb] === 'function') {
    window[_pendingJsonpCb](response);
  }
};
// ─── PRODUCT COLORS ──────────────────────────────────────────────
const PROD_COLORS = [
  '#6366f1','#22d3ee','#10b981','#f59e0b','#ef4444',
  '#8b5cf6','#ec4899','#14b8a6','#f97316','#06b6d4',
  '#a855f7','#84cc16','#e11d48','#0ea5e9','#d946ef',
  '#65a30d','#ea580c','#7c3aed','#0891b2','#be185d'
];
function getProdColor(i) { return PROD_COLORS[i % PROD_COLORS.length]; }
// ─── PRODUCT NORMALIZATION ────────────────────────────────────────
function normalizeProduct(name) {
  if (!name) return '기타';
  const n = name.trim();
  if (n.includes('무가') || n.includes('아마존 중동') || n.includes('POC')) return '대량무가';
  if (n.includes('유가') || n.includes('2차 활용')) return '유가';
  if (n.includes('USP') || n.includes('1M 패키지')) return 'USP 테스트';
  if (n.includes('물류대행')) return '물류대행';
  if (n.includes('소재수급')) return '소재수급';
  return '기타';
}

function getProducts(client, brand, squad, year, month) {
  const key = client+'|'+brand+'|'+squad+'|'+String(year).replace(/['"]/g,'').trim()+'|'+parseInt(month);
  return PRODUCT_MAP[key] || [];
}
function renderProdTags(client, brand, squad, year, month) {
  const prods = getProducts(client, brand, squad, year, month);

    script.src = gasUrl + sep + 'callback='+cbName+'&id='+encodeURIComponent(sheetId)+'&gid='+gid;
    script.onerror = (e) => {
      clearTimeout(timeoutId); delete window[cbName];
      dbg('❌ GAS script load error');
      resolve(null);
    };
    document.body.appendChild(script);
  });
}
// ─── Google Visualization API (공식 라이브러리, file://에서도 작동 가능) ──
function fetchViaGoogleViz(sheetId, gid) {
  gid = gid || 0;
  dbg('── Google Visualization API 시도 (gid='+gid+')');
  return new Promise((resolve) => {
    try {
      if (typeof google === 'undefined' || !google.charts) {
        dbg('⚠️ Google Charts 라이브러리 미로드');
        resolve(null); return;
      }
      google.charts.load('current');
      google.charts.setOnLoadCallback(() => {
        try {
          const url = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+gid;
          const query = new google.visualization.Query(url);
          query.setTimeout(20);
          query.send(function(response) {
            if (response.isError()) {
              dbg('❌ Google Viz error: '+response.getMessage());
              resolve(null); return;
            }
            dbg('✅ Google Viz 응답 수신');
            const dt = response.getDataTable();
            const numCols = dt.getNumberOfColumns();
            const numRows = dt.getNumberOfRows();
            dbg('   '+numRows+'행 × '+numCols+'열');
            // DataTable → gviz 호환 형식으로 변환
            const cols = []; for (let c=0;c<numCols;c++) cols.push({type:dt.getColumnType(c),label:dt.getColumnLabel(c)});
            const rows = [];
            for (let r=0;r<numRows;r++) {
              const cells = [];
              for (let c=0;c<numCols;c++) {
                const v = dt.getValue(r,c);
                const f = dt.getFormattedValue(r,c);
                cells.push({v:v, f:f||''});
              }
              rows.push({c:cells});
            }
            const fakeResp = {status:'ok', table:{cols:cols, rows:rows, parsedNumHeaders:1}};
            const parsed = parseGvizResponse(fakeResp);
            if (parsed) parsed._rawResponse = fakeResp;
            resolve(parsed);
          });
        } catch(e) { dbg('❌ Google Viz query error: '+e.message); resolve(null); }
      });
    } catch(e) { dbg('❌ Google Viz init error: '+e.message); resolve(null); }
  });
}

// ─── 인플 지급 시트(gid=1385383205) 파싱 ─────────────────────────
// 컬럼: C=고객사, D=브랜드, E=CSM, I=금액(USD), J=금액(KRW), K=지급일자
function parseInfluPayResponse(response) {
  try {
    const table = response.table;
    if (!table || !table.rows) return [];
    const data = [];
    const cClient=2, cBrand=3, cCsm=4, cYear=5, cMonth=6, cUsd=8, cKrw=9, cDate=10;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v != null ? c[idx].v : (c[idx].f || '')) : '';
      let rawDate = val(cDate);
      let dateStr = '';
      if (rawDate instanceof Date) {
        dateStr = rawDate.getFullYear()+'-'+String(rawDate.getMonth()+1).padStart(2,'0')+'-'+String(rawDate.getDate()).padStart(2,'0');
      } else if (typeof rawDate === 'string' && rawDate.startsWith('Date(')) {
        const m = rawDate.match(/Date\((\d+),(\d+),(\d+)/);
        if (m) dateStr = m[1]+'-'+String(parseInt(m[2])+1).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      } else if (rawDate) {
        const m = String(rawDate).match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})/);
        if (m) dateStr = m[1]+'-'+String(m[2]).padStart(2,'0')+'-'+String(m[3]).padStart(2,'0');
      }
      if (!dateStr) continue;
      const krw = parseFloat(String(val(cKrw)||'').replace(/[₩,W\s]/g,'')) || 0;
      const usd = parseFloat(String(val(cUsd)||'').replace(/[$,\s]/g,'')) || 0;
      const amt = krw > 0 ? krw : Math.round(usd * FX_USD_TO_KRW);
      if (amt <= 0) continue;
      data.push({
        date: dateStr,
        ym: dateStr.slice(0,7),
        amt,
        client: String(val(cClient)||'').trim(),
        brand: String(val(cBrand)||'').trim(),
        csm: String(val(cCsm)||'').trim(),
        year: String(val(cYear)||'').replace(/['"]/g,'').trim(),
        month: parseInt(val(cMonth)) || 0,
        usdOriginal: usd,
        krwOriginal: krw > 0
      });
    }
    return data;
  } catch(e) {
    dbg('⚠️ 인플 지급 파싱 에러: '+e.message);
    return [];
  }
}
// ─── Cashflow sheet → PRODUCT_MAP 파싱 ───────────────────────────
// cashflow 시트에서 C=캠페인, D=고객사, E=브랜드, F=상품, N=연도, O=월, P=수취, Q=지급
function parseCashflowForProducts(response) {
  try {
    const table = response.table;
    const numCols = table.cols ? table.cols.length : 0;
    if (numCols < 15) return null; // cashflow 형식이 아님
    const productMap = {};
    const campList = [];
    let rowCount = 0;
    for (const row of table.rows) {
      const c = row.c;
      if (!c) continue;
      const val = (idx) => c[idx] ? (c[idx].v !== null && c[idx].v !== undefined ? c[idx].v : (c[idx].f || '')) : '';
      const client = String(val(2)).trim();   // C=고객사
      const brand = String(val(3)).trim();    // D=브랜드
      const product = String(val(4)).trim();  // E=상품
      const squad = String(val(6)).trim();    // G=담당스쿼드
      const year = String(val(12)).replace(/['"]/g,'').trim(); // M=연도
      const month = parseInt(val(13));        // N=월
      const inAmt = parseFloat(String(val(14)).replace(/[₩,W]/g,'')) || 0;  // O=수취
      const outAmt = parseFloat(String(val(15)).replace(/[₩,W]/g,'')) || 0; // P=지급
      if (!client || !product || isNaN(month)) continue;
      const gp = inAmt - outAmt;
      // 매칭 키: 고객사|브랜드|담당스쿼드|연도|월 (통합정산 C~G ↔ cashflow D,E,H,N,O)
      const normProd = normalizeProduct(product);
      const pKey = client+'|'+brand+'|'+squad+'|'+year+'|'+month;
      if (!productMap[pKey]) productMap[pKey] = {};
      if (!productMap[pKey][normProd]) productMap[pKey][normProd] = {gp:0, inAmt:0};
      productMap[pKey][normProd].gp += gp;
      productMap[pKey][normProd].inAmt += inAmt;
      rowCount++;
      // Campaign timeline extraction
      const campName = String(val(1)).trim();
      const dateVal2 = (idx) => { const v = val(idx); if (!v) return null; const s = String(v).trim(); if (!s || s === '—') return null; if (s.match(/^Date\(/)) { const dm = s.match(/Date\((\d+),(\d+),(\d+)\)/); if(dm) return new Date(+dm[1],+dm[2],+dm[3]).toISOString().slice(0,10); } return s.length >= 10 ? s.slice(0,10) : null; };
      const numVal2 = (idx) => { const v = val(idx); return v ? (parseInt(v) || 0) : 0; };
      if (numCols > 25 && campName) {
        const ds = dateVal2(25), de = dateVal2(26), ss = dateVal2(27), rs = dateVal2(28), re = dateVal2(29), ce = dateVal2(30), are = dateVal2(34);
        const ta = numVal2(31), ts = numVal2(32), tr = numVal2(33);
        if (ds || ss || rs || ce) {
          campList.push({campaign:campName, client, brand, product, squad, year, month, gp, discStart:ds, discEnd:de, shipStart:ss, recStart:rs, recEnd:re, contractEnd:ce, tgtAccept:ta, tgtShip:ts, tgtRec:tr, actualRecEnd:are});
        }
      }
    }
    // Array 형태로 변환 (GP 내림차순 정렬)
    const result = {};
    for (const [k, prods] of Object.entries(productMap)) {
      result[k] = Object.entries(prods)
        .map(([name, v]) => ({name, gp:v.gp, inAmt:v.inAmt}))
        .sort((a,b) => b.gp - a.gp);
    }
    // Store campaign data globally
    if (campList.length > 0) {
      CAMPAIGN_DATA = campList;
      dbg('✅ 캠페인 타임라인 '+campList.length+'건 로드 (cashflow 별도 파싱)');
    }
    dbg('Cashflow 파싱: '+rowCount+'행 → '+Object.keys(result).length+'개 상품 키');
    return Object.keys(result).length > 0 ? result : null;
  } catch(e) {
    dbg('❌ Cashflow parse error: '+e.message);
    return null;
  }
}

async function loadProductData(sheetId) {
  dbg('📦 상품 데이터 로드 시작...');
  const manualGid = localStorage.getItem('tkcle_cashflow_gid');
  const defaultGids = [159763230, 0, 1, 2, 3, 4, 5].filter(g => g !== MAIN_GID);
  const gidList = manualGid ? [parseInt(manualGid)] : defaultGids;
  dbg('탐색 gid 목록: ['+gidList.join(',')+']'+(manualGid?' (수동설정)':''));
  let mainSig = null;
  if (RAW.length > 0) {
    mainSig = RAW.length + '|' + (RAW[0]||[]).join('|').substring(0, 100);
  }
  for (const gid of gidList) {
    let response = null;
    if (GAS_URL) {
      response = await fetchSheetGAS(GAS_URL, sheetId, gid, '_handleProd'+gid);
    }
    if (!response) {
      response = await fetchSheetJSONP(sheetId, gid, '_handleProd'+gid);
    }
    // Google Viz API fallback for product sheets
    if (!response && typeof google !== 'undefined' && google.visualization) {
      dbg('📡 상품 시트 Google Viz: gid='+gid);
      const vizData = await fetchViaGoogleViz(sheetId, gid);
      if (vizData && vizData._rawResponse) response = vizData._rawResponse;
    }
    if (!response || !response.table) {
      dbg('gid='+gid+': 응답 없음 (시트 없거나 권한 문제)');
      continue;
    }
    const rows = response.table.rows || [];
    const numCols = response.table.cols?.length || 0;
    // 메인 시트 중복 방지: 열 수가 다르면 다른 시트로 간주 (cashflow는 보통 30열 이상)
    const sig = numCols + ':' + rows.length + '|' + (rows[0]?.c||[]).map(c => c?.v||'').join('|').substring(0, 100);
    if (mainSig && sig === mainSig) {
      dbg('gid='+gid+': 메인 시트 중복 → skip');
      continue;
    }
    dbg('gid='+gid+': '+numCols+'열, '+rows.length+'행');
    if (numCols >= 15) {
      const prodMap = parseCashflowForProducts(response);
      if (prodMap) {
        PRODUCT_MAP = prodMap;
        localStorage.setItem('tkcle_cashflow_gid', String(gid));
        dbg('✅ gid='+gid+'에서 상품 '+Object.keys(prodMap).length+'개 키 매칭 완료!');
        return true;
      } else { dbg('gid='+gid+': cashflow 형식이나 매칭 결과 없음'); }
    } else { dbg('gid='+gid+': '+numCols+'열 < 15 → cashflow 아님'); }
  }
  dbg('❌ cashflow 시트 미발견 (gid '+gidList.join(',')+' 탐색 완료)');
  return false;
}

  const mo = parseInt(m[2]);

  const curY = now.getFullYear();
  const curM = now.getMonth() + 1;
  return (y > curY) || (y === curY && mo > curM);

function renderWaterfall(canvas, waterfall) {
  if(wfChart) wfChart.destroy();
  const wfFuture = waterfall.map(w => isFutureMonth(w.ym));
  const wfOpacity = (base, isFut) => {
    if (!isFut) return base;
    // Parse rgba or hex to apply reduced opacity
    if (base.startsWith('#')) {
      const r = parseInt(base.slice(1,3),16), g = parseInt(base.slice(3,5),16), b = parseInt(base.slice(5,7),16);
      return 'rgba('+r+','+g+','+b+',0.3)';
    }
    return base.replace(/[\d.]+\)$/,'0.3)');
  };
  const wfGPArr = waterfall.map(w => w.gp);
  const wfMomLabels = wfGPArr.map((gp, i) => {
    if (i === 0) return null;
    const diff = gp - wfGPArr[i-1];
    if (diff === 0) return null;
    return { diff, label: (diff >= 0 ? '▲ ' : '▼ ') + fmtW(Math.abs(diff)) };
  });
  // Positive and negative stacks separately for correct bar-top positioning
  const posTotal = waterfall.map(w => {
    let s = 0;
    if (w.newGP > 0) s += w.newGP;
    if (w.reGP > 0) s += w.reGP;
    if (w.contChg > 0) s += w.contChg;
    return s;
  });
  wfChart = new Chart(canvas, { type:'bar', data: { labels: waterfall.map(w=>w.ym), datasets: [
    { label:'신규 유입', data:waterfall.map(w=>w.newGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#10b981',wfFuture[i])), borderRadius:3 },
    { label:'복귀', data:waterfall.map(w=>w.reGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#38bdf8',wfFuture[i])), borderRadius:3 },
    { label:'기존 고객 변동', data:waterfall.map(w=>w.contChg), backgroundColor:waterfall.map((w,i)=>wfOpacity(w.contChg>=0?'#f59e0b':'#fb923c',wfFuture[i])), borderRadius:3 },
    { label:'종료 이탈', data:waterfall.map(w=>w.endGP), backgroundColor:waterfall.map((w,i)=>wfOpacity('#ef4444',wfFuture[i])), borderRadius:3 }
  ]}, options: { responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{position:'bottom', labels:{color:'#94a3b8', font:{size:11}, boxWidth:12, padding:12}},
      tooltip:{callbacks:{label:c=>{
        const w = waterfall[c.dataIndex]; const total = w.gp;
        const pctVal = total!==0 ? ((c.raw/total)*100).toFixed(1) : '0.0';
        return c.dataset.label+': '+fmtW(c.raw)+' ('+pctVal+'%)'+(isFutureMonth(w.ym)?' (예정)':'');
      }}}
    },
    scales:{x:{stacked:true, ticks:{color:waterfall.map(w=>isFutureMonth(w.ym)?'rgba(148,163,184,0.4)':'#94a3b8')}}, y:{stacked:true, ticks:{callback:v=>fmt(v)}, grid:{color:'rgba(100,116,139,0.15)'}}},
    animation: {
      onComplete: function() {
        const chart = this;
        const ctx = chart.ctx;
        const meta0 = chart.getDatasetMeta(0); // 신규유입 bars (first positive)
        ctx.save();
        ctx.font = 'bold 10px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        wfMomLabels.forEach((item, i) => {
          if (!item) return;
          // Find the topmost bar for this index
          let topY = Infinity;
          [0,1,2,3].forEach(dsIdx => {
            const m = chart.getDatasetMeta(dsIdx);
            if (m && m.data[i]) {
              const barY = m.data[i].y;
              if (barY < topY) topY = barY;
            }
          });
          if (topY === Infinity) return;
          const bar = meta0.data[i];
          if (!bar) return;
          ctx.fillStyle = item.diff >= 0 ? '#4ade80' : '#f87171';
          ctx.fillText(item.label, bar.x, topY - 4);
        });
        ctx.restore();
      }
    }
  } });
}

function heatColor(val, maxVal) {
  if(val===0) return 'transparent';
  if(val<0) return 'rgba(239,68,68,'+(0.4+Math.min(Math.abs(val)/maxVal,1)*0.6).toFixed(2)+')';
  const logVal = Math.log10(val+1);
  const logMax = Math.log10(maxVal+1);
  const ratio = logMax>0 ? logVal/logMax : 0;
  const intensity = 0.12 + ratio * 0.88;
  const r = Math.round(79 - ratio*30);
  const g = Math.round(70 - ratio*20);
  const b = Math.round(229 + ratio*20);
  return 'rgba('+r+','+g+','+Math.min(b,255)+','+intensity.toFixed(2)+')';
}

        }

          months[ym][key] += amt;
        };

          if (ym < startYm) return;
          bump(ym, 'in', d.taxAmtIn || 0);
        });
        INFLU_PAY_DATA.forEach(p => {
          if (!p.ym || p.ym < startYm) return;
          bump(p.ym, 'out', p.amt);
        });
        const sortedYms = Object.keys(months).sort();
        let cum = 0;
        const rows = sortedYms.map(ym => {
          const inn = months[ym].in;
          const out = months[ym].out;
          const net = inn - out;
          cum += net;
          return {ym, inn, out, net, cum};
        });
        const totalIn = rows.reduce((s,r)=>s+r.inn, 0);
        const totalOut = rows.reduce((s,r)=>s+r.out, 0);
        const totalNet = totalIn - totalOut;
        const fmt = (n) => '₩'+(Math.round(n)).toLocaleString();

                <div style="font-size:20px;font-weight:700;color:#f8fafc">${fmt((()=>{const d=pa.data[am?.ym||'']||{};return Object.values(d).reduce((s,v)=>s+Math.max(0,v.gp),0);})())}</div>
                <div style="font-size:11px;color:#64748b">총 GP</div>

            <div style="height:240px"><canvas id="prodStackGP"></canvas></div>
          </div>
        </div>
        <div style="border-top:1px solid #1e293b;margin-bottom:28px"></div>
        <!-- 6-3 Trend -->
        <div style="margin-bottom:12px">
          <h2 style="font-size:15px;margin-bottom:12px">📈 상품별 트렌드 & 인사이트</h2>
          <p class="sub">범례 클릭으로 특정 상품을 on/off 할 수 있습니다</p>
          <div style="height:320px"><canvas id="prodTrendLine"></canvas></div>

        </div>
        </div><!-- /prod-charts-content -->
      </div>
    </div>
    <p class="footer">TikCle 매출총이익 대시보드 · 데이터 ${RAW.length}건 · 기간 ${monthly[0]?.ym} ~ ${monthly[monthly.length-1]?.ym} · <a href="#" onclick="toggleConfigUI();return false" style="color:#6366f1;text-decoration:none">⚙ 데이터 설정</a></p>
  `;
  requestAnimationFrame(() => {
    updateStatusUI();
    if(currentTab==='overview') {
      drawGauge(document.getElementById('gaugeCanvas'), pct);
      renderCumChart(document.getElementById('cumCanvas'), monthly, ANNUAL_TARGET, months);
      renderGPBar(document.getElementById('gpBarCanvas'), waterfall, monthly, idx => { selectedMonthIdx=idx; currentTab='portfolio'; render(); });
      renderWaterfall(document.getElementById('wfCanvas'), waterfall);
    }
    if(currentTab==='csm' && document.getElementById('csmBarCanvas')) {
      new Chart(document.getElementById('csmBarCanvas'), {
        type:'bar',
        data: { labels:csmData.map(c=>c.name), datasets:[{label:'매출총이익',data:csmData.map(c=>c.gp),backgroundColor:'#4f46e5',borderRadius:6}] },
        options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmtW(c.raw)}}}, scales:{x:{ticks:{callback:v=>fmt(v)}}} }
      });
    }
    if(currentTab==='product') {
      renderProductCharts(pa, midx);
    }
    if(currentTab==='tax' && TAX_DATA.length > 0 && document.getElementById('taxMonthlyChart')) {
      const monthlyData = {};
      TAX_DATA.forEach(d => {
        if (!monthlyData[d.ym]) monthlyData[d.ym] = {issued_paid: 0, issued_not_paid: 0, not_issued: 0};
        if (d.invoiceInfo && d.paid) monthlyData[d.ym].issued_paid += d.taxAmtIn;
        else if (d.invoiceInfo && !d.paid) monthlyData[d.ym].issued_not_paid += d.taxAmtIn;
        else monthlyData[d.ym].not_issued += d.taxAmtIn;
      });
      const monthKeys = Object.keys(monthlyData).sort();
      new Chart(document.getElementById('taxMonthlyChart'), {
        type: 'bar',
        data: {
          labels: monthKeys,
          datasets: [
            {label: '발행완료+입금완료', data: monthKeys.map(m => monthlyData[m].issued_paid), backgroundColor: '#10b981', borderRadius: 4},
            {label: '발행완료+미입금', data: monthKeys.map(m => monthlyData[m].issued_not_paid), backgroundColor: '#f59e0b', borderRadius: 4},
            {label: '미발행', data: monthKeys.map(m => monthlyData[m].not_issued), backgroundColor: '#64748b', borderRadius: 4}
          ]
        },
        options: {
          indexAxis: 'x',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {legend: {display: true, labels: {color: '#94a3b8', font: {size: 12}}}, tooltip: {callbacks: {label: c => fmtW(c.raw)}}},
          scales: {x: {stacked: true, ticks: {color: '#94a3b8', font: {size: 11}}}, y: {stacked: true, ticks: {callback: v => fmt(v), color: '#94a3b8', font: {size: 11}}, grid: {color: '#1e293b44'}}}
        }
      });
    }
  });
  // 새로고침 후에도 뱃지 즉시 복원

  if (currentTab === 'cashflow') setTimeout(drawCashflowChart, 50);
}
let _cashflowChartInstance = null;
function drawCashflowChart() {
  const canvas = document.getElementById('cashflowChartCanvas');
  if (!canvas || !window.__cashflowChartData) return;
  const rows = window.__cashflowChartData;
  if (_cashflowChartInstance) { try { _cashflowChartInstance.destroy(); } catch(e){} }
  _cashflowChartInstance = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: rows.map(r => r.ym),
      datasets: [
        { label: '유입(매출)', data: rows.map(r => r.inn), backgroundColor: '#3b82f6', stack: 'a', order: 2 },
        { label: '유출(인플 정산)', data: rows.map(r => -r.out), backgroundColor: '#ef4444', stack: 'a', order: 2 },
        { label: '누적 순현금', type: 'line', data: rows.map(r => r.cum),
          borderColor: '#fbbf24', backgroundColor: 'transparent', borderWidth: 2,
          pointRadius: 3, pointBackgroundColor: '#fbbf24', tension: 0.3, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#cbd5e1', font: {size: 11} } },
        tooltip: {
          callbacks: {
            label: (ctx) => ctx.dataset.label + ': ₩' + Math.round(Math.abs(ctx.parsed.y)).toLocaleString()
          }
        }
      },
      scales: {
        x: { ticks: { color: '#94a3b8' }, grid: { color: '#1e293b' } },
        y: {
          ticks: { color: '#94a3b8', callback: (v) => '₩' + (v/1000000).toFixed(0) + 'M' },
          grid: { color: '#1e293b' }
        }
      }
    }
  });
}

function testSheetAccess() {
  const resultEl = document.getElementById('testResult');
  if (!resultEl) return;
  resultEl.style.display = 'block';
  const sheetId = extractSheetId(SHEETS_ID);
  if (!sheetId) { resultEl.innerHTML = '❌ 시트 ID가 비어있습니다.'; return; }
  resultEl.innerHTML = '⏳ 시트 접근 테스트 중...';
  const testUrl = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID;
  // JSONP로 테스트
  const cbName = '_test_' + Date.now();
  let done = false;
  const timer = setTimeout(() => {
    if (done) return; done = true; delete window[cbName];
    resultEl.innerHTML = '❌ <b>JSONP 테스트 실패</b> (15초 timeout)<br>' +
      '<span style="color:#64748b">원인 가능성:</span><br>' +
      '• 시트가 공개되지 않음 → Google Sheets → 공유 → "링크가 있는 모든 사용자" 설정<br>' +
      '• 시트 ID 오류 → 현재 ID: <code>'+sheetId+'</code><br>' +
      '• 직접 확인: <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">이 링크를 새 탭에서 열어보세요</a>';
  }, 15000);
  window[cbName] = function(resp) {
    if (done) return; done = true; clearTimeout(timer); delete window[cbName];
    if (resp && resp.status === 'ok' && resp.table) {
      const rowCount = resp.table.rows ? resp.table.rows.length : 0;
      const colCount = resp.table.cols ? resp.table.cols.length : 0;
      resultEl.innerHTML = '✅ <b>시트 접근 성공!</b><br>' +
        '행: '+rowCount+' | 열: '+colCount+'<br>' +
        '<span style="color:#64748b">JSONP 정상 작동 → "다시 연결" 버튼을 눌러주세요</span>';
    } else if (resp && resp.status === 'error') {
      const err = resp.errors?.[0]?.detailed_message || resp.errors?.[0]?.message || 'unknown';
      resultEl.innerHTML = '❌ <b>Google API 에러:</b> '+err+'<br>' +
        '• 시트 공개 설정을 확인해주세요<br>' +
        '• <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">브라우저에서 직접 확인</a>';
    } else {
      resultEl.innerHTML = '⚠️ 응답은 받았으나 예상과 다른 형식입니다.';
    }
  };
  // google.visualization.Query.setResponse 라우팅
  _pendingJsonpCb = cbName;
  const s = document.createElement('script');
  s.src = testUrl + '&tqx=responseHandler:'+cbName;
  s.onerror = () => {
    if (done) return; done = true; clearTimeout(timer); delete window[cbName];
    resultEl.innerHTML = '❌ <b>스크립트 로드 실패</b><br>' +
      '• 네트워크 연결 확인<br>' +
      '• 시트 ID 확인: <code>'+sheetId+'</code><br>' +
      '• <a href="'+testUrl+'" target="_blank" style="color:#60a5fa">직접 확인 링크</a>';
  };
  document.body.appendChild(s);
}
function togglePasteUI() {
  const el = document.getElementById('pastePanel');

}
// ─── 로컬 파일에서 gviz JSON 로드 (file:// 환경용) ────────────────
function loadFromFile(input, type) {
  const file = input.files[0];
  if (!file) return;
  const statusEl = document.getElementById('fileLoadStatus');
  if (statusEl) statusEl.textContent = '📂 '+file.name+' 읽는 중...';
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      let text = e.target.result;
      // google.visualization.Query.setResponse(...) 래퍼 제거
      text = text.replace(/^\/\*O_o\*\/\s*/, '');
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?\s*$/);
      if (match) text = match[1];
      // 또는 순수 JSON일 수 있음
      const data = JSON.parse(text);
      if (!data.table || !data.table.rows) {
        if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ 유효하지 않은 gviz 형식</span>';
        return;
      }
      dbg('📂 파일 로드: '+file.name+' ('+data.table.rows.length+'행, '+data.table.cols.length+'열)');
      if (type === 'main') {
        const parsed = parseGvizResponse(data, 'main');
        if (parsed && parsed.rows && parsed.rows.length > 0) {
          RAW.length = 0;
          parsed.rows.forEach(r => RAW.push(r));
          dataSource = 'sheets';
          lastUpdateTime = new Date();
          rebuildGlobals();
          render();
          dbg('✅ 메인 파일 로드 완료: '+parsed.rows.length+'행');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">✅ 메인 데이터 '+parsed.rows.length+'행 로드 완료!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ 파싱 실패 — 시트 형식 확인</span>';
        }
      } else if (type === 'cashflow') {
        const prodMap = parseCashflowForProducts(data);
        if (prodMap && Object.keys(prodMap).length > 0) {
          PRODUCT_MAP = prodMap;
          render();
          dbg('✅ Cashflow 파일 로드 완료: '+Object.keys(prodMap).length+'개 상품 키');
          if (statusEl) statusEl.innerHTML = '<span style="color:#4ade80">✅ 상품 데이터 '+Object.keys(prodMap).length+'개 키 로드!</span>';
        } else {
          if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ cashflow 파싱 실패</span>';
        }
      }
      updateDebugPanel();
    } catch(err) {
      dbg('❌ 파일 파싱 에러: '+err.message);
      if (statusEl) statusEl.innerHTML = '<span style="color:#f87171">❌ JSON 파싱 에러: '+err.message+'</span>';
      updateDebugPanel();
    }
  };
  reader.readAsText(file);
}
function updateJsonLinks() {
  const sheetId = extractSheetId(SHEETS_ID);
  if (!sheetId) return;
  const mainLink = document.getElementById('mainJsonLink');
  const cfLink = document.getElementById('cfJsonLink');
  if (mainLink) mainLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+MAIN_GID;
  // cashflow gid: localStorage에 저장된 값 또는 기본값
  const cfGid = localStorage.getItem('tkcle_cashflow_gid') || '0';
  if (cfLink) cfLink.href = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?gid='+cfGid;
}
// Only auto-load if already authenticated (session persists on refresh)
if (sessionStorage.getItem('tkcle_auth') === '1') {
  loadData(true).then(()=>{updateDebugPanel();updateJsonLinks();});
}
