<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f172a; color:#e2e8f0; font-family:'Inter',sans-serif; padding:24px 32px; min-height:100vh; }
  
  /* ─── Password Lock Screen ─── */
  #lockScreen {
    position:fixed; inset:0; z-index:9999;
    background:#0f172a;
    display:flex; align-items:center; justify-content:center;
    transition: opacity 0.4s ease;
  }
  #lockScreen.fade-out { opacity:0; pointer-events:none; }
  .lock-box {
    background:#1e293b; border:1px solid #334155; border-radius:16px;
    padding:40px 36px; width:360px; text-align:center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .lock-box .lock-icon { font-size:40px; margin-bottom:16px; }
  .lock-box h2 { font-size:20px; font-weight:700; color:#f8fafc; margin-bottom:6px; }
  .lock-box p { font-size:13px; color:#64748b; margin-bottom:24px; }
  .lock-box input {
    width:100%; padding:12px 16px; border-radius:10px;
    border:1px solid #334155; background:#0f172a; color:#e2e8f0;
    font-size:15px; text-align:center; letter-spacing:2px;
    outline:none; transition: border-color 0.2s;
  }
  .lock-box input:focus { border-color:#6366f1; }
  .lock-box input.shake {
    animation: shake 0.4s ease;
    border-color:#ef4444;
  }
  .lock-box button {
    margin-top:16px; width:100%; padding:12px;
    border:none; border-radius:10px; cursor:pointer;
    background:linear-gradient(135deg,#6366f1,#818cf8);
    color:#fff; font-size:14px; font-weight:600;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .lock-box button:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(99,102,241,0.4); }
  .lock-box .error-msg { color:#f87171; font-size:12px; margin-top:10px; min-height:18px; }
  @keyframes shake {
    0%,100% { transform:translateX(0); }
    20%,60% { transform:translateX(-8px); }
    40%,80% { transform:translateX(8px); }
  }

  .month-select { background:#0f172a; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:6px 12px; font-size:13px; cursor:pointer; }
  .up { color:#4ade80; font-weight:500; }
